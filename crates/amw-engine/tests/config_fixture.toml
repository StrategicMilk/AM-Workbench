[server]
host = "127.0.0.1"
port = 10933
auth_token_path = "auth-token"
auth_policy_path = "auth-policy.json"
[models]
dirs = ["models"]
[budgets]
vram_gb = 12.0
ram_gb = 24.0
margin_pct = 10.0
[slots]
count = 2
default_ctx = 4096
[kv]
cache_type_k = "q8_0"
cache_type_v = "f16"
session_dir = "sessions"
[idle]
keep_alive = "5m"
[scheduler]
preemption = true
batch_token_budget = 2048
[log]
level = "info"
dir = "logs"
