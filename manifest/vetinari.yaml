# AM Workbench runtime manifest
project_name: Vetinari AM Workbench
description: Desktop orchestration workbench backed by the Rust AM kernel.
created_at: 2026-03-01T12:00:00Z
manifest_version: 2

high_level_goal: "Run local orchestration workflows through the Tauri desktop host and Rust kernel API."

runtime:
  desktop_host: src-tauri
  kernel_crate: crates/amw-kernel
  kernel_binary: amw-kernel-server
  default_bind:
    host: 127.0.0.1
    port: 8080
  state_dir_env: AMW_KERNEL_STATE_DIR
  readiness_endpoint: /ready
  retired_entrypoints:
    - "python -m vetinari serve"

model_backends:
  local_native:
    optional: true
    discovery_env: VETINARI_NATIVE_MODELS_DIR
    adapters:
      - vllm
      - nim
  gguf_legacy:
    optional: true
    discovery_env: VETINARI_MODELS_DIR
    note: "GGUF discovery is retained for compatibility; it is not the primary runtime API host."

tasks:
  - id: run-kernel
    description: "Start the Rust kernel API for desktop and workflow clients."
    command_ref: "amw-kernel-server --host ${AMW_KERNEL_HOST:-127.0.0.1} --port ${AMW_KERNEL_PORT:-8080}"
    outputs: ["kernel-readiness", "state-receipts"]
  - id: launch-desktop
    description: "Launch the Tauri desktop host against the local kernel."
    command_ref: "cargo tauri dev"
    dependencies: ["run-kernel"]
    outputs: ["desktop-session"]

artifacts_dir: outputs
prompts_dir: prompts
logging:
  level: INFO
  log_dir: logs
upgrade_policy:
  auto_upgrade: false
  require_approval: true
  post_upgrade_validation: true
output_strategy:
  multi_language_support: true
discovery_filters:
  allow_unverified_models: false
  max_context_len: 32768
  min_capabilities: ["code_gen"]
  max_model_memory_gb: 96
