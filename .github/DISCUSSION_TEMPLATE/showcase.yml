title: "[Showcase] "
labels: ["showcase"]
body:
  - type: markdown
    attributes:
      value: |
        Share a Vetinari workflow, agent pipeline, or training run you built.
  - type: textarea
    id: description
    attributes:
      label: What did you build?
      description: One paragraph plus a screenshot or asciinema link.
    validations:
      required: true
  - type: input
    id: repo_link
    attributes:
      label: Repository or gist link (optional)
