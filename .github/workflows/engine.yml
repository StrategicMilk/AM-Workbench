name: AM Engine build and distribution

on:
  workflow_dispatch:
    inputs:
      measure_only:
        description: Report unsigned per-leg size baselines without publishing
        required: true
        default: true
        type: boolean
      dev_mode:
        description: Explicit unsigned dry run; never valid for release publication
        required: true
        default: false
        type: boolean
      publish_release:
        description: Sign assets, upload them to an existing draft release, and publish it immutably
        required: true
        default: false
        type: boolean
      macos_pilot:
        description: Run the non-default macOS pilot
        required: true
        default: false
        type: boolean

concurrency:
  group: engine-distribution-${{ inputs.publish_release && 'publish' || 'nonpublish' }}-${{ github.ref }}
  cancel-in-progress: ${{ !inputs.publish_release }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SOURCE_DATE_EPOCH: "1722470400"
  RUST_TOOLCHAIN: "1.88.0"
  CUDA_TOOLKIT_VERSION: "12.4.1"
  LLAMA_REV: "86a9c79f866799eb0e7e89c03578ccfbcc5d808e"
  LLAMA_NORMALIZED_TREE_SHA256: "fec1a92e3956bb2eec6f6f4b7f5a5b4111fe3461accd4cb58efb0068eca6c3ab"

jobs:
  supply-chain:
    name: Supply-chain policy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-engine-ci.txt
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.88.0
      - name: Install pinned supply-chain tools
        run: |
          cargo install cargo-deny --version 0.18.4 --locked
          cargo install cargo-audit --version 0.22.2 --locked
          python -m pip install --disable-pip-version-check --require-hashes --only-binary=:all: --requirement requirements-engine-ci.txt
      - name: Validate exact dependency and attribution evidence
        run: |
          uv pip compile requirements-engine-ci.in \
            --output-file "${RUNNER_TEMP}/requirements-engine-ci.txt" \
            --generate-hashes \
            --only-binary :all: \
            --python-platform linux \
            --python-version 3.12 \
            --no-header
          cmp requirements-engine-ci.txt "${RUNNER_TEMP}/requirements-engine-ci.txt"
          python scripts/check_converter_lock.py
          python scripts/generate_spdx_sbom.py --check
          python scripts/check_dependency_license_export.py --strict --all-extras
          python scripts/generate_engine_attribution.py --check
          python scripts/validate_engine_release.py policy \
            --workflow .github/workflows/engine.yml \
            --ci-requirements requirements-engine-ci.txt \
            --ledger docs/reference/engine-size-baselines.json \
            --cuda-evidence docs/reference/engine-cuda-certification.json
      - name: Cargo deny
        run: cargo deny check licenses bans sources --config deny.toml
      - name: Package-scoped RustSec audit
        run: python scripts/check_rustsec_package.py --package amw-engine --output rustsec-amw-engine.json
      - name: Exercise production Sigstore verifier against official GitHub fixture
        env:
          AMW_TEST_SIGSTORE_REFRESH: "1"
        run: >-
          python -m pytest tests/test_engine_provenance_attestation.py
          -k official_github_docs_attestation -q --noconftest
      - name: Validate retained RustSec report
        if: always()
        shell: bash
        run: |
          test -s rustsec-amw-engine.json
          python -m json.tool rustsec-amw-engine.json >/dev/null
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: rustsec-amw-engine
          path: rustsec-amw-engine.json
          if-no-files-found: error
      - name: Verify vendored llama.cpp revision and attribution
        shell: bash
        run: |
          test -s crates/amw-engine/NOTICE
          test -s crates/amw-engine/vendor/llama.cpp/LICENSE
          test -s crates/amw-engine/vendor/llama.cpp/requirements/requirements-convert_lora_to_gguf.txt
          upstream="${RUNNER_TEMP}/llama-upstream"
          archive="${RUNNER_TEMP}/llama-${LLAMA_REV}.tar.gz"
          mkdir -p "$upstream"
          curl --fail --location --retry 3 \
            "https://github.com/ggml-org/llama.cpp/archive/${LLAMA_REV}.tar.gz" \
            --output "$archive"
          tar --extract --gzip --file "$archive" --directory "$upstream" --strip-components=1
          python scripts/verify_llama_vendor.py \
            --upstream "$upstream" \
            --revision "$LLAMA_REV" \
            --expected-digest "$LLAMA_NORMALIZED_TREE_SHA256"
      - name: Verify and retain commit-pinned model license evidence
        shell: bash
        run: |
          python scripts/verify_engine_model_fixture.py \
            --model-output "${{ runner.temp }}/supply-chain-fixture.gguf" \
            --evidence-directory model-license-evidence
          python scripts/verify_engine_model_fixture.py \
            --fixture fim \
            --model-output "${{ runner.temp }}/supply-chain-fim-fixture.gguf" \
            --evidence-directory model-license-evidence/fim
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: engine-native-fixture-license-evidence
          path: model-license-evidence
          if-no-files-found: error
      - name: Stage immutable release size policy
        shell: bash
        run: |
          mkdir release-policy
          cp scripts/validate_engine_release.py release-policy/validate_engine_release.py
          cp docs/reference/engine-size-baselines.json release-policy/engine-size-baselines.json
          test "$(find release-policy -maxdepth 1 -type f | wc -l)" = "2"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: engine-release-policy
          path: release-policy
          if-no-files-found: error

  build:
    name: ${{ matrix.bundle }}
    needs: supply-chain
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle: windows-cpu
            runner: windows-latest
            platform: windows
            accel: cpu
            feature: cpu
            test_feature: cpu
            executable_suffix: .exe
            cmake_cuda: "OFF"
            size_ledger_key: windows-cpu
            rustflags: "--remap-path-prefix=${{ github.workspace }}=. -C link-arg=/Brepro"
            cflags: "/O2"
            cxxflags: "/O2"
            cmake_linker_flags: "/Brepro"
          - bundle: windows-cuda
            runner: windows-latest
            platform: windows
            accel: cuda
            feature: cuda
            test_feature: cpu,cuda
            executable_suffix: .exe
            cmake_cuda: "ON"
            size_ledger_key: windows-cuda
            rustflags: "--remap-path-prefix=${{ github.workspace }}=. -C link-arg=/Brepro"
            cflags: "/O2"
            cxxflags: "/O2"
            cmake_linker_flags: "/Brepro"
          - bundle: linux-cpu
            runner: ubuntu-latest
            platform: linux
            accel: cpu
            feature: cpu
            test_feature: cpu
            executable_suffix: ""
            cmake_cuda: "OFF"
            size_ledger_key: linux-cpu
            rustflags: "--remap-path-prefix=${{ github.workspace }}=. -C link-arg=-Wl,--build-id=none"
            cflags: "-O2 -ffile-prefix-map=${{ github.workspace }}=. -fdebug-prefix-map=${{ github.workspace }}=."
            cxxflags: "-O2 -ffile-prefix-map=${{ github.workspace }}=. -fdebug-prefix-map=${{ github.workspace }}=."
            cmake_linker_flags: "-Wl,--build-id=none -static-libgcc -static-libstdc++"
          - bundle: linux-cuda
            runner: ubuntu-latest
            platform: linux
            accel: cuda
            feature: cuda
            test_feature: cpu,cuda
            executable_suffix: ""
            cmake_cuda: "ON"
            size_ledger_key: linux-cuda
            rustflags: "--remap-path-prefix=${{ github.workspace }}=. -C link-arg=-Wl,--build-id=none"
            cflags: "-O2 -ffile-prefix-map=${{ github.workspace }}=. -fdebug-prefix-map=${{ github.workspace }}=."
            cxxflags: "-O2 -ffile-prefix-map=${{ github.workspace }}=. -fdebug-prefix-map=${{ github.workspace }}=."
            cmake_linker_flags: "-Wl,--build-id=none -static-libgcc -static-libstdc++"
    env:
      ARFLAGS: crD
      CFLAGS: ${{ matrix.cflags }}
      CXXFLAGS: ${{ matrix.cxxflags }}
      RUSTFLAGS: ${{ matrix.rustflags }}
      BUNDLE_DIR: dist/${{ matrix.bundle }}
    steps:
      - name: Enable Windows long paths before checkout
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --global core.longpaths true
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.88.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-engine-ci.txt
      - name: Install hash-locked real-process test environment
        run: |
          python -m pip install --disable-pip-version-check --require-hashes --only-binary=:all: --requirement requirements-engine-ci.txt
      - name: Install CUDA 12.x
        if: matrix.accel == 'cuda'
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76
        with:
          cuda: 12.4.1
          method: network
      - name: Verify runner requirements
        shell: bash
        run: |
          cmake --version
          rustc --version
          if [[ "${{ matrix.accel }}" == "cuda" ]]; then nvcc --version; fi
      - name: Provision governed native GGUF fixture
        shell: bash
        env:
          AMW_ENGINE_NATIVE_TEST_MODEL: ${{ runner.temp }}/amw-engine-native-fixture/tinyllama-15M-stories-Q2_K.gguf
        run: |
          python scripts/verify_engine_model_fixture.py \
            --model-output "$AMW_ENGINE_NATIVE_TEST_MODEL" \
            --evidence-directory "${{ runner.temp }}/amw-engine-native-fixture/evidence"
      - name: Provision governed native FIM GGUF fixture
        shell: bash
        env:
          AMW_ENGINE_NATIVE_FIM_TEST_MODEL: ${{ runner.temp }}/amw-engine-native-fim-fixture/qwen2.5-coder-0.5b-instruct-q2_k.gguf
        run: |
          python scripts/verify_engine_model_fixture.py \
            --fixture fim \
            --model-output "$AMW_ENGINE_NATIVE_FIM_TEST_MODEL" \
            --evidence-directory "${{ runner.temp }}/amw-engine-native-fim-fixture/evidence"
      - name: Run native engine tests with governed fixture
        shell: bash
        env:
          AMW_ENGINE_NATIVE_TEST_MODEL: ${{ runner.temp }}/amw-engine-native-fixture/tinyllama-15M-stories-Q2_K.gguf
          AMW_ENGINE_NATIVE_FIM_TEST_MODEL: ${{ runner.temp }}/amw-engine-native-fim-fixture/qwen2.5-coder-0.5b-instruct-q2_k.gguf
        run: cargo test -p amw-engine --features "${{ matrix.test_feature }}" --locked
      - name: Build native real-process test server
        shell: bash
        run: cargo build -p amw-engine --bin amw-engine-server --features "${{ matrix.test_feature }}" --locked
      - name: Prove public native embeddings through the real server
        shell: bash
        env:
          AMW_ENGINE_NATIVE_TEST_MODEL: ${{ runner.temp }}/amw-engine-native-fixture/tinyllama-15M-stories-Q2_K.gguf
          AMW_ENGINE_NATIVE_FIM_TEST_MODEL: ${{ runner.temp }}/amw-engine-native-fim-fixture/qwen2.5-coder-0.5b-instruct-q2_k.gguf
        run: python -m pytest tests/test_engine_embeddings_contract.py::test_governed_fixture_returns_stable_normalized_native_embeddings -q -n 0 --noconftest
      - name: Prove public native FIM through the real server
        shell: bash
        env:
          AMW_ENGINE_NATIVE_TEST_MODEL: ${{ runner.temp }}/amw-engine-native-fixture/tinyllama-15M-stories-Q2_K.gguf
          AMW_ENGINE_NATIVE_FIM_TEST_MODEL: ${{ runner.temp }}/amw-engine-native-fim-fixture/qwen2.5-coder-0.5b-instruct-q2_k.gguf
        run: python -m pytest tests/test_engine_contract.py::test_governed_fim_model_completes_public_infill_and_stops_at_exact_limit -q -n 0 --noconftest
      - name: Require one explicit dispatch mode
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if [[ "${{ inputs.publish_release }}" == "true" ]]; then
            [[ "${{ inputs.measure_only }}" == "false" && "${{ inputs.dev_mode }}" == "false" ]] || {
              echo "publish_release cannot be combined with measure_only or dev_mode" >&2
              exit 1
            }
          elif [[ "${{ inputs.measure_only }}" != "true" && "${{ inputs.dev_mode }}" != "true" ]]; then
            echo "unsigned non-measurement dispatch requires dev_mode=true" >&2
            exit 1
          fi
      - name: Assert publish ref and tag match engine version
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REF: ${{ github.ref }}
        run: |
          python - <<'PY'
          import os, tomllib
          from pathlib import Path
          version = tomllib.loads(Path("crates/amw-engine/Cargo.toml").read_text(encoding="utf-8"))["package"]["version"]
          expected = f"v{version}"
          if os.environ["RELEASE_TAG"] != expected:
              raise SystemExit(f"release tag {os.environ['RELEASE_TAG']!r} must equal {expected!r}")
          if os.environ["RELEASE_REF"] != f"refs/tags/{expected}":
              raise SystemExit("publish_release must be dispatched from the immutable release tag")
          PY
      - name: Build AM Engine
        shell: bash
        run: cargo build -p amw-engine --release --features "${{ matrix.feature }}" --locked
      - name: Build llama export tools
        shell: bash
        run: |
          cmake -S crates/amw-engine/vendor/llama.cpp -B build/llama \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DGGML_OPENMP=OFF \
            -DGGML_CUDA=${{ matrix.cmake_cuda }} \
            -DCMAKE_CUDA_RUNTIME_LIBRARY=Static \
            -DCMAKE_C_FLAGS_RELEASE="$CFLAGS" \
            -DCMAKE_CXX_FLAGS_RELEASE="$CXXFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.cmake_linker_flags }}"
          cmake --build build/llama --config Release --target llama-quantize llama-imatrix --parallel 2
      - name: Component reproducibility check - rebuild Linux CPU server
        if: matrix.bundle == 'linux-cpu'
        shell: bash
        run: |
          first_sha="$(sha256sum target/release/amw-engine-server | cut -d' ' -f1)"
          cargo clean -p amw-engine
          cargo build -p amw-engine --release --features cpu --locked
          second_sha="$(sha256sum target/release/amw-engine-server | cut -d' ' -f1)"
          test "$first_sha" = "$second_sha" || { echo "deterministic rebuild SHA-256 mismatch" >&2; exit 1; }
      - name: Provision hash-locked converter environment and license corpus
        shell: bash
        run: |
          python -m venv converter-smoke-venv
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            converter_python="$(python -c 'from pathlib import Path; print(Path("converter-smoke-venv/Scripts/python.exe").resolve())')"
          else
            converter_python="$(python -c 'from pathlib import Path; print(Path("converter-smoke-venv/bin/python").resolve())')"
          fi
          "$converter_python" -m pip install \
            --disable-pip-version-check \
            --require-hashes \
            --only-binary=:all: \
            --requirement crates/amw-engine/converter/requirements-convert_lora_to_gguf.txt
          cuda_eula_args=()
          if [[ "${{ matrix.accel }}" == "cuda" ]]; then
            mkdir -p dist
            curl --fail --location --proto '=https' --tlsv1.2 \
              --output dist/NVIDIA-CUDA-12.4.1-EULA.pdf \
              https://docs.nvidia.com/cuda/archive/12.4.1/pdf/EULA.pdf
            echo "6ada441ae5a45a4a3d51ade8850fa2229fc6dd95de0c9da6e2cdd7a46701b844  dist/NVIDIA-CUDA-12.4.1-EULA.pdf" | sha256sum --check --strict
            cuda_eula_args=(--cuda-eula dist/NVIDIA-CUDA-12.4.1-EULA.pdf)
          fi
          python scripts/stage_engine_license_corpus.py \
            --converter-python "$converter_python" \
            --accelerator "${{ matrix.accel }}" \
            "${cuda_eula_args[@]}" \
            --output dist/engine-license-corpus
      - name: Stage required bundle content
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          from pathlib import Path

          root = Path("dist") / "${{ matrix.bundle }}"
          root.mkdir(parents=True, exist_ok=True)
          server = Path("target/release") / "amw-engine-server${{ matrix.executable_suffix }}"
          if not server.is_file():
              raise SystemExit(f"missing server binary: {server}")
          quantized = [p for p in Path("build/llama").rglob("llama-quantize${{ matrix.executable_suffix }}") if p.is_file()]
          if len(quantized) != 1:
              raise SystemExit(f"expected one llama-quantize binary, found {quantized}")
          imatrix = [p for p in Path("build/llama").rglob("llama-imatrix${{ matrix.executable_suffix }}") if p.is_file()]
          if len(imatrix) != 1:
              raise SystemExit(f"expected one llama-imatrix binary, found {imatrix}")
          shutil.copy2(server, root / server.name)
          shutil.copy2(quantized[0], root / quantized[0].name)
          shutil.copy2(imatrix[0], root / imatrix[0].name)
          vendor = Path("crates/amw-engine/vendor/llama.cpp")
          shutil.copy2(vendor / "convert_hf_to_gguf.py", root / "convert_hf_to_gguf.py")
          shutil.copy2(vendor / "convert_lora_to_gguf.py", root / "convert_lora_to_gguf.py")
          requirements = Path("crates/amw-engine/converter/requirements-convert_lora_to_gguf.txt")
          shutil.copy2(requirements, root / requirements.name)
          shutil.copy2(vendor / "LICENSE", root / "LICENSE.llama.cpp")
          shutil.copy2("crates/amw-engine/NOTICE", root / "NOTICE")
          shutil.copy2(
              "crates/amw-engine/ENGINE_THIRD_PARTY_LICENSES.md",
              root / "ENGINE_THIRD_PARTY_LICENSES.md",
          )
          shutil.copytree("dist/engine-license-corpus", root / "ENGINE_LICENSES")
          for source_root, destination_root in (
              (vendor / "conversion", root / "conversion"),
              (vendor / "gguf-py" / "gguf", root / "gguf-py" / "gguf"),
          ):
              for source in sorted(source_root.rglob("*")):
                  if not source.is_file() or (source.suffix != ".py" and source.name != "py.typed"):
                      continue
                  destination = destination_root / source.relative_to(source_root)
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, destination)
          PY
      - name: Enforce binary size budget
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          python scripts/validate_engine_release.py size \
            --bundle "${{ matrix.size_ledger_key }}" \
            --binary "$BUNDLE_DIR/amw-engine-server${{ matrix.executable_suffix }}" \
            --ledger docs/reference/engine-size-baselines.json \
            --enforce
      - name: Report server size against committed ledger
        if: github.event_name != 'workflow_dispatch' || !inputs.publish_release
        shell: bash
        run: |
          python scripts/validate_engine_release.py size \
            --bundle "${{ matrix.size_ledger_key }}" \
            --binary "$BUNDLE_DIR/amw-engine-server${{ matrix.executable_suffix }}" \
            --ledger docs/reference/engine-size-baselines.json | tee "size-${{ matrix.bundle }}.json"
      - name: Generate inner manifest and deterministic bundle
        shell: bash
        env:
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_COMMIT: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref }}
          SOURCE_WORKFLOW: ${{ github.workflow_ref }}
          SOURCE_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import hashlib, json, os, re, subprocess, tomllib, zipfile
          from pathlib import Path

          bundle_id = "${{ matrix.bundle }}"
          root = Path("dist") / bundle_id
          cargo = tomllib.loads(Path("crates/amw-engine/Cargo.toml").read_text(encoding="utf-8"))
          package_text = Path("vetinari/__init__.py").read_text(encoding="utf-8")
          min_pkg = re.search(r'^__version__ = "([^"]+)"$', package_text, re.MULTILINE)
          if min_pkg is None:
              raise SystemExit("unable to resolve min_pkg_version")
          def digest(path):
              hasher = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      hasher.update(chunk)
              return hasher.hexdigest()
          def tree_digest(path):
              hasher = hashlib.sha256()
              items = sorted(
                  (candidate for candidate in path.rglob("*") if candidate.is_file()),
                  key=lambda candidate: candidate.relative_to(path).as_posix(),
              )
              for item in items:
                  relative = item.relative_to(path).as_posix().encode("utf-8")
                  normalized = item.read_bytes().replace(b"\r\n", b"\n")
                  hasher.update(relative + b"\0" + hashlib.sha256(normalized).digest())
              return hasher.hexdigest()
          source_tree = subprocess.run(
              ["git", "rev-parse", "HEAD^{tree}"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout.strip()
          if not re.fullmatch(r"[0-9a-f]{40}", source_tree):
              raise SystemExit("unable to measure the checked-out source tree")
          if subprocess.run(["git", "diff", "--quiet"], check=False).returncode != 0:
              raise SystemExit("tracked source changed during the release build")
          vendor = Path("crates/amw-engine/vendor/llama.cpp")
          vendor_tree_sha256 = tree_digest(vendor)
          if vendor_tree_sha256 != os.environ["LLAMA_NORMALIZED_TREE_SHA256"]:
              raise SystemExit("vendored llama.cpp tree disagrees with the supply-chain provenance pin")
          materials = {
              "source_tree": source_tree,
              "cargo_lock_sha256": digest(Path("Cargo.lock")),
              "workspace_manifest_sha256": digest(Path("Cargo.toml")),
              "engine_manifest_sha256": digest(Path("crates/amw-engine/Cargo.toml")),
              "engine_build_sha256": digest(Path("crates/amw-engine/build.rs")),
              "vendor_tree_sha256": vendor_tree_sha256,
              "vendor_license_sha256": digest(vendor / "LICENSE"),
              "converter_requirements_sha256": digest(Path("crates/amw-engine/converter/requirements-convert_lora_to_gguf.txt")),
              "native_fixture_model_url": "https://huggingface.co/tensorblock/tinyllama-15M-stories-GGUF/resolve/51b755181aac158c3ee689c0bd86f49a8291d1da/tinyllama-15M-stories-Q2_K.gguf",
              "native_fixture_model_sha256": "f7e39dc9f26f3d39bf59e885349c6eec65880f685322d591f53e6cdb46ceb2e9",
              "native_fixture_license_url": "https://huggingface.co/tensorblock/tinyllama-15M-stories-GGUF/resolve/51b755181aac158c3ee689c0bd86f49a8291d1da/README.md",
              "native_fixture_license_sha256": "c8434895da38a8720e24712d2d79a0b4dfba77c94a5307ac974f44c194ad0af7",
              "fim_fixture_model_url": "https://huggingface.co/Qwen/Qwen2.5-Coder-0.5B-Instruct-GGUF/resolve/ebb2015119c907b064c512bf053e945850b5875f/qwen2.5-coder-0.5b-instruct-q2_k.gguf",
              "fim_fixture_model_revision": "ebb2015119c907b064c512bf053e945850b5875f",
              "fim_fixture_model_sha256": "f9bddf294ef15c80bb64a2cdcf15d5b25caf88fb4f4a12383bc9f7a01a09c2e3",
              "fim_fixture_model_size_bytes": 415182720,
              "fim_fixture_license_url": "https://huggingface.co/Qwen/Qwen2.5-Coder-0.5B-Instruct-GGUF/resolve/ebb2015119c907b064c512bf053e945850b5875f/LICENSE",
              "fim_fixture_license_sha256": "832dd9e00a68dd83b3c3fb9f5588dad7dcf337a0db50f7d9483f310cd292e92e",
          }
          inner_rows = []
          for path in sorted(p for p in root.rglob("*") if p.is_file() and not p.name.startswith(".")):
              inner_rows.append({"platform": "${{ matrix.platform }}", "accel": "${{ matrix.accel }}", "file": path.relative_to(root).as_posix(), "sha256": digest(path), "size_bytes": path.stat().st_size})
          inner = {"engine_version": cargo["package"]["version"], "libllama_rev": cargo["package"]["metadata"]["am_engine"]["libllama_rev"], "min_pkg_version": min_pkg.group(1), "artifacts": inner_rows}
          (root / "manifest.json").write_text(json.dumps(inner, sort_keys=True, separators=(",", ":")), encoding="utf-8")
          required = {"amw-engine-server${{ matrix.executable_suffix }}", "llama-imatrix${{ matrix.executable_suffix }}", "llama-quantize${{ matrix.executable_suffix }}", "convert_hf_to_gguf.py", "convert_lora_to_gguf.py", "requirements-convert_lora_to_gguf.txt", "LICENSE.llama.cpp", "NOTICE", "ENGINE_THIRD_PARTY_LICENSES.md", "ENGINE_LICENSES/INDEX.json", "manifest.json", "conversion/__init__.py", "conversion/base.py", "gguf-py/gguf/__init__.py", "gguf-py/gguf/constants.py", "gguf-py/gguf/py.typed"}
          names = {path.relative_to(root).as_posix() for path in root.rglob("*") if path.is_file()}
          missing = required - names
          if missing:
              raise SystemExit(f"bundle is missing required entries: {sorted(missing)}")
          archive = Path("dist") / f"amw-engine-{bundle_id}.zip"
          with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED, compresslevel=9) as output:
              for path in sorted(p for p in root.rglob("*") if p.is_file() and not p.name.startswith(".")):
                  relative = path.relative_to(root).as_posix()
                  info = zipfile.ZipInfo(relative, date_time=(1980, 1, 1, 0, 0, 0))
                  executable = relative in {"amw-engine-server", "llama-imatrix", "llama-quantize"}
                  info.external_attr = (0o100755 if executable else 0o100644) << 16
                  info.compress_type = zipfile.ZIP_DEFLATED
                  output.writestr(info, path.read_bytes())
          fragment = {
              "engine_version": inner["engine_version"],
              "libllama_rev": inner["libllama_rev"],
              "min_pkg_version": inner["min_pkg_version"],
              "artifacts": [{"platform": "${{ matrix.platform }}", "accel": "${{ matrix.accel }}", "file": archive.name, "sha256": digest(archive), "size_bytes": archive.stat().st_size}],
              "provenance": {
                  "repository": os.environ["SOURCE_REPOSITORY"],
                  "source_commit": os.environ["SOURCE_COMMIT"],
                  "source_ref": os.environ["SOURCE_REF"],
                  "workflow": os.environ["SOURCE_WORKFLOW"],
                  "run_id": os.environ["SOURCE_RUN_ID"],
                  "runner": "${{ matrix.runner }}",
                  "feature": "${{ matrix.feature }}",
                  "toolchain": {"rust": "1.88.0", "cuda": "12.4.1"},
                  "cuda": "12.4.1" if "${{ matrix.accel }}" == "cuda" else "not-applicable",
                  "deterministic_flags": [
                      "SOURCE_DATE_EPOCH=1722470400",
                      "RUSTFLAGS=${{ matrix.rustflags }}",
                      "CFLAGS=${{ matrix.cflags }}",
                      "CXXFLAGS=${{ matrix.cxxflags }}",
                      "CMAKE_EXE_LINKER_FLAGS=${{ matrix.cmake_linker_flags }}",
                      "ARFLAGS=crD",
                      "normalized-zip-timestamp",
                  ],
                  "rebuild_inputs": materials,
              },
          }
          Path("dist", f"manifest-{bundle_id}.json").write_text(json.dumps(fragment, sort_keys=True, indent=2), encoding="utf-8")
          PY
      - name: Assert bundle contents
        shell: bash
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          archive = Path("dist/amw-engine-${{ matrix.bundle }}.zip")
          vendor = Path("crates/amw-engine/vendor/llama.cpp")
          required = {"amw-engine-server${{ matrix.executable_suffix }}", "llama-imatrix${{ matrix.executable_suffix }}", "llama-quantize${{ matrix.executable_suffix }}", "convert_hf_to_gguf.py", "convert_lora_to_gguf.py", "requirements-convert_lora_to_gguf.txt", "LICENSE.llama.cpp", "NOTICE", "ENGINE_THIRD_PARTY_LICENSES.md", "manifest.json"}
          required.update(
              f"conversion/{path.relative_to(vendor / 'conversion').as_posix()}"
              for path in (vendor / "conversion").rglob("*")
              if path.is_file() and path.suffix == ".py"
          )
          required.update(
              f"gguf-py/gguf/{path.relative_to(vendor / 'gguf-py' / 'gguf').as_posix()}"
              for path in (vendor / "gguf-py" / "gguf").rglob("*")
              if path.is_file() and (path.suffix == ".py" or path.name == "py.typed")
          )
          required.update(
              f"ENGINE_LICENSES/{path.relative_to('dist/engine-license-corpus').as_posix()}"
              for path in Path("dist/engine-license-corpus").rglob("*")
              if path.is_file()
          )
          with zipfile.ZipFile(archive) as bundle:
              names = set(bundle.namelist())
              if bundle.read("LICENSE.llama.cpp") != (vendor / "LICENSE").read_bytes():
                  raise SystemExit("archive does not retain the complete upstream llama.cpp MIT license")
              if bundle.read("ENGINE_THIRD_PARTY_LICENSES.md") != Path("crates/amw-engine/ENGINE_THIRD_PARTY_LICENSES.md").read_bytes():
                  raise SystemExit("archive does not retain the exact engine dependency attribution ledger")
              requirements = bundle.read("requirements-convert_lora_to_gguf.txt").decode("utf-8")
              if any(line.lstrip().startswith("-r") for line in requirements.splitlines()):
                  raise SystemExit("converter requirements contain an unresolved recursive include")
          missing = required - names
          unexpected = names - required
          if missing or unexpected:
              raise SystemExit(f"archive content assertion failed: missing={sorted(missing)}, unexpected={sorted(unexpected)}")
          PY
      - name: Validate and smoke-test the packaged archive
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            converter_python="$(python -c 'from pathlib import Path; print(Path("converter-smoke-venv/Scripts/python.exe").resolve())')"
          else
            converter_python="$(python -c 'from pathlib import Path; print(Path("converter-smoke-venv/bin/python").resolve())')"
          fi
          python scripts/validate_engine_release.py archive \
            --archive "dist/amw-engine-${{ matrix.bundle }}.zip" \
            --platform "${{ matrix.platform }}" \
            --accelerator "${{ matrix.accel }}" \
            --converter-python "$converter_python" \
            --run-smokes
      - name: Stage flat build handoff
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          from pathlib import Path

          bundle = "${{ matrix.bundle }}"
          root = Path("build-handoff")
          root.mkdir()
          for source in (Path("dist") / f"amw-engine-{bundle}.zip", Path("dist") / f"manifest-{bundle}.json"):
              shutil.copy2(source, root / source.name)
          expected = {f"amw-engine-{bundle}.zip", f"manifest-{bundle}.json"}
          actual = {path.name for path in root.iterdir() if path.is_file()}
          if actual != expected or any(path.is_dir() for path in root.iterdir()):
              raise SystemExit(f"build handoff is not flat and exact: {sorted(actual)}")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: engine-${{ matrix.bundle }}
          path: build-handoff
          if-no-files-found: error

  cuda-certification:
    name: Certify CUDA runtime and model offload on governed GPU hardware
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: [self-hosted, vetinari-engine-gpu, linux, x64, cuda-12-4]
    timeout-minutes: 20
    environment: engine-release-cuda-certification
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: engine-linux-cuda
          path: cuda-certification/input
      - name: Assert exact CUDA certification input
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("cuda-certification/input")
          expected = {"amw-engine-linux-cuda.zip", "manifest-linux-cuda.json"}
          actual = {path.relative_to(root).as_posix() for path in root.rglob("*") if path.is_file()}
          if actual != expected:
              raise SystemExit(f"CUDA certification input is not flat and exact: {sorted(actual)}")
          PY
      - name: Provision pinned CUDA certification model
        shell: bash
        run: |
          mkdir -p cuda-certification/fixture
          curl --fail --location --proto '=https' --tlsv1.2 \
            --max-filesize 16777216 \
            --output cuda-certification/fixture/tinyllama-15M-stories-Q2_K.gguf \
            https://huggingface.co/tensorblock/tinyllama-15M-stories-GGUF/resolve/51b755181aac158c3ee689c0bd86f49a8291d1da/tinyllama-15M-stories-Q2_K.gguf
          test "$(stat -c '%s' cuda-certification/fixture/tinyllama-15M-stories-Q2_K.gguf)" = "13717344"
          echo "f7e39dc9f26f3d39bf59e885349c6eec65880f685322d591f53e6cdb46ceb2e9  cuda-certification/fixture/tinyllama-15M-stories-Q2_K.gguf" | sha256sum --check --strict
      - name: Require independently governed CUDA verifier
        shell: bash
        env:
          CERTIFIER_SHA256: ${{ vars.ENGINE_CUDA_CERTIFIER_SHA256 }}
        run: |
          certifier="/opt/vetinari/bin/amw-engine-cuda-certifier"
          [[ "$CERTIFIER_SHA256" =~ ^[0-9a-f]{64}$ ]] || { echo "protected CUDA certifier digest is missing or invalid" >&2; exit 1; }
          test -x "$certifier" || { echo "governed CUDA certifier is unavailable" >&2; exit 1; }
          test "$(stat -c '%u' "$certifier")" = "0" || { echo "governed CUDA certifier is not root-owned" >&2; exit 1; }
          permissions="$(stat -c '%a' "$certifier")"
          (( (8#$permissions & 022) == 0 )) || { echo "governed CUDA certifier is group/world-writable" >&2; exit 1; }
          echo "$CERTIFIER_SHA256  $certifier" | sha256sum --check --strict
      - name: Run governed CUDA device and model-offload certification
        shell: bash
        run: |
          mkdir -p cuda-certification/result
          /opt/vetinari/bin/amw-engine-cuda-certifier \
            --archive cuda-certification/input/amw-engine-linux-cuda.zip \
            --manifest cuda-certification/input/manifest-linux-cuda.json \
            --model cuda-certification/fixture/tinyllama-15M-stories-Q2_K.gguf \
            --output cuda-certification/result/cuda-device-certification.json \
            --source-commit "${{ github.sha }}" \
            --workflow-run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --workflow-run-attempt "${{ github.run_attempt }}" \
            --runner-label self-hosted \
            --runner-label vetinari-engine-gpu \
            --runner-label linux \
            --runner-label x64 \
            --runner-label cuda-12-4
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: engine-cuda-device-certification
          path: cuda-certification/result/cuda-device-certification.json
          if-no-files-found: error

  cuda-certification-binding:
    name: Independently bind CUDA evidence to protected runner and host identity
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release && startsWith(github.ref, 'refs/tags/v')
    needs: cuda-certification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: engine-release-cuda-certification
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-engine-ci.txt
      - name: Install hash-locked CUDA evidence verifier
        run: >-
          python -m pip install --disable-pip-version-check --require-hashes --only-binary=:all:
          --requirement requirements-engine-ci.txt
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: engine-cuda-device-certification
          path: cuda-certification/raw
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: engine-linux-cuda
          path: cuda-certification/subject
      - name: Assert exact independently downloaded CUDA subject
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("cuda-certification/subject")
          expected = {"amw-engine-linux-cuda.zip", "manifest-linux-cuda.json"}
          actual = {path.relative_to(root).as_posix() for path in root.rglob("*") if path.is_file()}
          if actual != expected:
              raise SystemExit(f"CUDA certification subject is not flat and exact: {sorted(actual)}")
          PY
      - name: Capture independent workflow-job and repository runner inventories
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUNNER_AUDIT_TOKEN: ${{ secrets.ENGINE_RUNNER_AUDIT_TOKEN }}
        run: |
          test -n "$GH_TOKEN" || { echo "workflow Actions-read token is unavailable" >&2; exit 1; }
          test -n "$RUNNER_AUDIT_TOKEN" || { echo "protected runner-audit token is unavailable" >&2; exit 1; }
          mkdir -p cuda-certification/metadata cuda-certification/result
          gh api -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}/jobs?per_page=100" \
            > cuda-certification/metadata/workflow-jobs.json
          GH_TOKEN="$RUNNER_AUDIT_TOKEN" gh api -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/${{ github.repository }}/actions/runners?per_page=100" \
            > cuda-certification/metadata/runner-inventory.json
      - name: Bind certification to exact isolated runner and host authority
        shell: bash
        env:
          EXPECTED_RUNNER_ID: ${{ vars.ENGINE_CUDA_CERTIFICATION_RUNNER_ID }}
          EXPECTED_RUNNER_NAME: ${{ vars.ENGINE_CUDA_CERTIFICATION_RUNNER_NAME }}
          EXPECTED_MACHINE_ID_SHA256: ${{ vars.ENGINE_CUDA_HOST_ID_SHA256 }}
          EXPECTED_SERVICE_ACCOUNT: ${{ vars.ENGINE_CUDA_SERVICE_ACCOUNT }}
          EXPECTED_WORK_DIRECTORY: ${{ vars.ENGINE_CUDA_WORK_DIRECTORY }}
          CERTIFIER_PUBLIC_KEY_DER_BASE64: ${{ vars.ENGINE_CUDA_CERTIFIER_PUBLIC_KEY_DER_BASE64 }}
        run: |
          python scripts/validate_engine_release.py bind-cuda-runner \
            --cuda-evidence cuda-certification/raw/cuda-device-certification.json \
            --runner-metadata cuda-certification/metadata/runner-inventory.json \
            --workflow-jobs cuda-certification/metadata/workflow-jobs.json \
            --subject-directory cuda-certification/subject \
            --output cuda-certification/result/cuda-certification.json \
            --expected-runner-id "$EXPECTED_RUNNER_ID" \
            --expected-runner-name "$EXPECTED_RUNNER_NAME" \
            --expected-machine-id-sha256 "$EXPECTED_MACHINE_ID_SHA256" \
            --expected-service-account "$EXPECTED_SERVICE_ACCOUNT" \
            --expected-work-directory "$EXPECTED_WORK_DIRECTORY" \
            --certifier-public-key-der-base64 "$CERTIFIER_PUBLIC_KEY_DER_BASE64" \
            --expected-commit "${{ github.sha }}" \
            --expected-workflow-run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --expected-workflow-run-attempt "${{ github.run_attempt }}"
      - name: Validate governed CUDA certification result
        shell: bash
        env:
          EXPECTED_RUNNER_ID: ${{ vars.ENGINE_CUDA_CERTIFICATION_RUNNER_ID }}
          EXPECTED_RUNNER_NAME: ${{ vars.ENGINE_CUDA_CERTIFICATION_RUNNER_NAME }}
          EXPECTED_MACHINE_ID_SHA256: ${{ vars.ENGINE_CUDA_HOST_ID_SHA256 }}
          EXPECTED_SERVICE_ACCOUNT: ${{ vars.ENGINE_CUDA_SERVICE_ACCOUNT }}
          EXPECTED_WORK_DIRECTORY: ${{ vars.ENGINE_CUDA_WORK_DIRECTORY }}
          CERTIFIER_PUBLIC_KEY_DER_BASE64: ${{ vars.ENGINE_CUDA_CERTIFIER_PUBLIC_KEY_DER_BASE64 }}
        run: |
          python scripts/validate_engine_release.py cuda-result \
            --cuda-evidence cuda-certification/result/cuda-certification.json \
            --expected-commit "${{ github.sha }}" \
            --expected-workflow-run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --expected-workflow-run-attempt "${{ github.run_attempt }}" \
            --expected-runner-id "$EXPECTED_RUNNER_ID" \
            --expected-runner-name "$EXPECTED_RUNNER_NAME" \
            --expected-machine-id-sha256 "$EXPECTED_MACHINE_ID_SHA256" \
            --expected-service-account "$EXPECTED_SERVICE_ACCOUNT" \
            --expected-work-directory "$EXPECTED_WORK_DIRECTORY" \
            --certifier-public-key-der-base64 "$CERTIFIER_PUBLIC_KEY_DER_BASE64"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: engine-cuda-certification
          path: cuda-certification/result/cuda-certification.json
          if-no-files-found: error

  publication-prerequisites:
    name: Require governed release measurements and CUDA certification
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release && startsWith(github.ref, 'refs/tags/v')
    needs: [supply-chain, build, cuda-certification-binding]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: engine-release-cuda-certification
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-engine-ci.txt
      - name: Install hash-locked CUDA evidence verifier
        run: >-
          python -m pip install --disable-pip-version-check --require-hashes --only-binary=:all:
          --requirement requirements-engine-ci.txt
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: engine-cuda-certification
          path: cuda-certification
      - name: Validate hosted publication evidence
        env:
          EXPECTED_RUNNER_ID: ${{ vars.ENGINE_CUDA_CERTIFICATION_RUNNER_ID }}
          EXPECTED_RUNNER_NAME: ${{ vars.ENGINE_CUDA_CERTIFICATION_RUNNER_NAME }}
          EXPECTED_MACHINE_ID_SHA256: ${{ vars.ENGINE_CUDA_HOST_ID_SHA256 }}
          EXPECTED_SERVICE_ACCOUNT: ${{ vars.ENGINE_CUDA_SERVICE_ACCOUNT }}
          EXPECTED_WORK_DIRECTORY: ${{ vars.ENGINE_CUDA_WORK_DIRECTORY }}
          CERTIFIER_PUBLIC_KEY_DER_BASE64: ${{ vars.ENGINE_CUDA_CERTIFIER_PUBLIC_KEY_DER_BASE64 }}
        run: |
          python scripts/validate_engine_release.py publication-gate \
            --workflow .github/workflows/engine.yml \
            --ledger docs/reference/engine-size-baselines.json \
            --cuda-evidence cuda-certification/cuda-certification.json \
            --expected-commit "${{ github.sha }}" \
            --expected-workflow-run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --expected-workflow-run-attempt "${{ github.run_attempt }}" \
            --expected-runner-id "$EXPECTED_RUNNER_ID" \
            --expected-runner-name "$EXPECTED_RUNNER_NAME" \
            --expected-machine-id-sha256 "$EXPECTED_MACHINE_ID_SHA256" \
            --expected-service-account "$EXPECTED_SERVICE_ACCOUNT" \
            --expected-work-directory "$EXPECTED_WORK_DIRECTORY" \
            --certifier-public-key-der-base64 "$CERTIFIER_PUBLIC_KEY_DER_BASE64"

  sign-windows:
    name: Sign ${{ matrix.bundle }} from clean artifacts
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release && startsWith(github.ref, 'refs/tags/v')
    needs: [build, publication-prerequisites]
    runs-on: windows-latest
    timeout-minutes: 30
    environment: engine-release-signing
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle: windows-cpu
          - bundle: windows-cuda
    env:
      AZURE_CORE_OUTPUT: none
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: engine-${{ matrix.bundle }}
          path: release-input
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: engine-release-policy
          path: release-policy
      - name: Extract artifact-only signing input
        shell: pwsh
        run: |
          $archive = Join-Path $env:GITHUB_WORKSPACE "release-input/amw-engine-${{ matrix.bundle }}.zip"
          if (-not (Test-Path -LiteralPath $archive -PathType Leaf)) { throw "unsigned bundle is missing" }
          Expand-Archive -LiteralPath $archive -DestinationPath "signing-input" -Force
          $required = @("amw-engine-server.exe", "llama-imatrix.exe", "llama-quantize.exe", "convert_hf_to_gguf.py", "convert_lora_to_gguf.py", "requirements-convert_lora_to_gguf.txt", "LICENSE.llama.cpp", "NOTICE", "ENGINE_THIRD_PARTY_LICENSES.md", "ENGINE_LICENSES/INDEX.json", "manifest.json", "conversion/__init__.py", "conversion/base.py", "gguf-py/gguf/__init__.py", "gguf-py/gguf/py.typed")
          foreach ($name in $required) {
            if (-not (Test-Path -LiteralPath (Join-Path "signing-input" $name) -PathType Leaf)) { throw "signing input is missing $name" }
          }
          $runtimeLibraries = Get-ChildItem -LiteralPath "signing-input" -Recurse -File | Where-Object { $_.Extension -in @(".dll", ".so", ".dylib") }
          if ($runtimeLibraries.Count -ne 0) { throw "native export tools must not depend on archive-local shared libraries" }
      - name: Require protected OIDC signing configuration
        shell: pwsh
        env:
          SIGNING_ENABLED: ${{ vars.ENGINE_SIGNING_ENABLED }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_SIGNING_ENDPOINT: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          AZURE_SIGNING_ACCOUNT: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          AZURE_CERTIFICATE_PROFILE: ${{ vars.AZURE_CERTIFICATE_PROFILE }}
          WINDOWS_SIGNER_SUBJECT: ${{ vars.ENGINE_WINDOWS_SIGNER_SUBJECT }}
          WINDOWS_SIGNER_ISSUER: ${{ vars.ENGINE_WINDOWS_SIGNER_ISSUER }}
        run: |
          if ($env:SIGNING_ENABLED -ne "true") { throw "release signing is not enabled" }
          foreach ($name in @("AZURE_CLIENT_ID", "AZURE_TENANT_ID", "AZURE_SUBSCRIPTION_ID", "AZURE_SIGNING_ENDPOINT", "AZURE_SIGNING_ACCOUNT", "AZURE_CERTIFICATE_PROFILE", "WINDOWS_SIGNER_SUBJECT", "WINDOWS_SIGNER_ISSUER")) {
            if ([string]::IsNullOrWhiteSpace((Get-Item -LiteralPath "Env:$name").Value)) { throw "protected signing variable $name is missing" }
          }
      - name: Exchange GitHub OIDC identity for Azure access
        uses: Azure/login@93381592711f247e165c389ebb30b596c84cdc48
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Sign Windows binaries with Azure Trusted Signing
        uses: Azure/artifact-signing-action@c41ab607157e82e3ed79e291b56f9e7425818b04
        with:
          endpoint: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE }}
          files-folder: ${{ github.workspace }}/signing-input
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-digest: SHA256
          cache-dependencies: false
          exclude-workload-identity-credential: false
          exclude-shared-token-cache-credential: true
          exclude-azure-cli-credential: false
      - name: Enforce signed server size budget before bundle rebuild
        shell: pwsh
        run: |
          $expected = @("validate_engine_release.py", "engine-size-baselines.json")
          $actual = @(Get-ChildItem -LiteralPath "release-policy" -File | ForEach-Object Name | Sort-Object)
          if (Compare-Object -ReferenceObject ($expected | Sort-Object) -DifferenceObject $actual) { throw "release policy artifact is not flat and exact" }
          if (Get-ChildItem -LiteralPath "release-policy" -Directory) { throw "release policy artifact contains a nested directory" }
          & python release-policy/validate_engine_release.py size `
            --bundle "${{ matrix.bundle }}" `
            --binary "signing-input/amw-engine-server.exe" `
            --ledger release-policy/engine-size-baselines.json `
            --enforce
          if ($LASTEXITCODE -ne 0) { throw "signed server exceeds its committed size ceiling" }
      - name: Verify signatures and rebuild signed bundle
        shell: pwsh
        env:
          EXPECTED_REPOSITORY: ${{ github.repository }}
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REF: ${{ github.ref }}
          EXPECTED_WORKFLOW: ${{ github.workflow_ref }}
          EXPECTED_RUN_ID: ${{ github.run_id }}
          WINDOWS_SIGNER_SUBJECT: ${{ vars.ENGINE_WINDOWS_SIGNER_SUBJECT }}
          WINDOWS_SIGNER_ISSUER: ${{ vars.ENGINE_WINDOWS_SIGNER_ISSUER }}
        run: |
          $executables = Get-ChildItem -LiteralPath "signing-input" -Filter *.exe
          if ($executables.Count -ne 3) { throw "expected exactly three signed Windows executables" }
          foreach ($file in $executables) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            if ($signature.Status -ne "Valid") { throw "invalid Authenticode signature for $($file.Name): $($signature.Status)" }
            if ($null -eq $signature.SignerCertificate) { throw "missing signer certificate for $($file.Name)" }
            if ($signature.SignerCertificate.Subject -cne $env:WINDOWS_SIGNER_SUBJECT) {
              throw "unexpected signer subject for $($file.Name): $($signature.SignerCertificate.Subject)"
            }
            if ($signature.SignerCertificate.Issuer -cne $env:WINDOWS_SIGNER_ISSUER) {
              throw "unexpected signer issuer for $($file.Name): $($signature.SignerCertificate.Issuer)"
            }
            $codeSigningOid = "1.3.6.1.5.5.7.3.3"
            if (-not ($signature.SignerCertificate.EnhancedKeyUsageList.ObjectId.Value -contains $codeSigningOid)) {
              throw "signer certificate for $($file.Name) does not assert the code-signing EKU"
            }
          }
          @'
          import hashlib, json, os, zipfile
          from pathlib import Path

          bundle_id = "${{ matrix.bundle }}"
          root = Path("signing-input")
          fragment_path = Path("release-input") / f"manifest-{bundle_id}.json"
          fragment = json.loads(fragment_path.read_text(encoding="utf-8"))
          provenance = fragment["provenance"]
          expected = {
              "repository": os.environ["EXPECTED_REPOSITORY"],
              "source_commit": os.environ["EXPECTED_COMMIT"],
              "source_ref": os.environ["EXPECTED_REF"],
              "workflow": os.environ["EXPECTED_WORKFLOW"],
              "run_id": os.environ["EXPECTED_RUN_ID"],
          }
          if any(provenance.get(key) != value for key, value in expected.items()):
              raise SystemExit("unsigned artifact provenance does not match this workflow identity")
          def digest(path):
              return hashlib.sha256(path.read_bytes()).hexdigest()
          inner_path = root / "manifest.json"
          inner = json.loads(inner_path.read_text(encoding="utf-8"))
          for row in inner["artifacts"]:
              path = root / row["file"]
              row["sha256"] = digest(path)
              row["size_bytes"] = path.stat().st_size
          inner_path.write_text(json.dumps(inner, sort_keys=True, separators=(",", ":")), encoding="utf-8")
          archive = Path(f"amw-engine-{bundle_id}.zip")
          with zipfile.ZipFile(archive, "w", compression=zipfile.ZIP_DEFLATED, compresslevel=9) as output:
              for path in sorted(candidate for candidate in root.rglob("*") if candidate.is_file()):
                  relative = path.relative_to(root).as_posix()
                  info = zipfile.ZipInfo(relative, date_time=(1980, 1, 1, 0, 0, 0))
                  info.external_attr = 0o100644 << 16
                  info.compress_type = zipfile.ZIP_DEFLATED
                  output.writestr(info, path.read_bytes())
          fragment["artifacts"][0]["sha256"] = digest(archive)
          fragment["artifacts"][0]["size_bytes"] = archive.stat().st_size
          fragment_path.write_text(json.dumps(fragment, sort_keys=True, indent=2), encoding="utf-8")
          '@ | python -
      - name: Stage flat signed handoff
        shell: pwsh
        run: |
          $root = New-Item -ItemType Directory -Path "signed-handoff"
          Copy-Item -LiteralPath "amw-engine-${{ matrix.bundle }}.zip" -Destination $root.FullName
          Copy-Item -LiteralPath "release-input/manifest-${{ matrix.bundle }}.json" -Destination $root.FullName
          $expected = @("amw-engine-${{ matrix.bundle }}.zip", "manifest-${{ matrix.bundle }}.json")
          $actual = @(Get-ChildItem -LiteralPath $root.FullName -File | ForEach-Object Name | Sort-Object)
          if (Compare-Object -ReferenceObject ($expected | Sort-Object) -DifferenceObject $actual) { throw "signed handoff is not flat and exact" }
          if (Get-ChildItem -LiteralPath $root.FullName -Directory) { throw "signed handoff contains a nested directory" }
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-engine-${{ matrix.bundle }}
          path: signed-handoff
          if-no-files-found: error

  validate-signed-windows:
    name: Revalidate signed ${{ matrix.bundle }} from clean artifacts
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release && startsWith(github.ref, 'refs/tags/v')
    needs: sign-windows
    runs-on: windows-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle: windows-cpu
            accel: cpu
          - bundle: windows-cuda
            accel: cuda
    steps:
      - name: Enable Windows long paths before checkout
        shell: pwsh
        run: git config --global core.longpaths true
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install governed release-validation requirements
        run: >-
          python -m pip install --disable-pip-version-check --require-hashes --only-binary=:all:
          --requirement requirements-engine-ci.txt
      - name: Install CUDA runtime for signed CUDA executable validation
        if: matrix.accel == 'cuda'
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76
        with:
          cuda: 12.4.1
          method: network
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: release-engine-${{ matrix.bundle }}
          path: signed-release
      - name: Provision uncached converter validation environment
        shell: pwsh
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONNOUSERSITE: "1"
        run: |
          $archive = Resolve-Path "signed-release/amw-engine-${{ matrix.bundle }}.zip"
          @'
          import zipfile
          from pathlib import Path

          archive = Path(r"${{ github.workspace }}") / "signed-release" / "amw-engine-${{ matrix.bundle }}.zip"
          with zipfile.ZipFile(archive) as bundle:
              Path("signed-converter-requirements.txt").write_bytes(
                  bundle.read("requirements-convert_lora_to_gguf.txt")
              )
          '@ | python -
          python -m venv signed-validator-venv
          $converterPython = (Resolve-Path "signed-validator-venv/Scripts/python.exe").Path
          & $converterPython -m pip install --disable-pip-version-check --no-cache-dir --require-hashes --only-binary=:all: --requirement signed-converter-requirements.txt
          if ($LASTEXITCODE -ne 0) { throw "locked converter dependency installation failed" }
          python scripts/validate_engine_release.py archive `
            --archive $archive `
            --platform windows `
            --accelerator "${{ matrix.accel }}" `
            --converter-python $converterPython `
            --run-smokes
          if ($LASTEXITCODE -ne 0) { throw "signed archive smoke validation failed" }
          $fixtureRoot = Join-Path $env:RUNNER_TEMP "amw-export-fixture-warm-${{ matrix.bundle }}"
          if (Test-Path -LiteralPath $fixtureRoot) { throw "converter fixture warm-up root already exists" }
          New-Item -ItemType Directory -Path $fixtureRoot | Out-Null
          & $converterPython scripts/probe_engine_export_toolchain.py --prepare-fixture $fixtureRoot | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "converter dependency closure warm-up failed" }
          & $converterPython scripts/probe_engine_export_toolchain.py `
            --write-interpreter-closure "signed-release/signed-validator-interpreter-closure-${{ matrix.bundle }}.json" `
            --write-interpreter-closure-objects "signed-release/signed-validator-interpreter-closure-${{ matrix.bundle }}.objects.zip" | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "converter interpreter closure snapshot failed" }
      - name: Protect signed-validator interpreter closure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: protected-signed-validator-interpreter-closure-${{ matrix.bundle }}
          path: |
            signed-release/signed-validator-interpreter-closure-${{ matrix.bundle }}.json
            signed-release/signed-validator-interpreter-closure-${{ matrix.bundle }}.objects.zip
          if-no-files-found: error
      - name: Verify downloaded signatures and exercise release-bootstrap export toolchain
        shell: pwsh
        env:
          WINDOWS_SIGNER_SUBJECT: ${{ vars.ENGINE_WINDOWS_SIGNER_SUBJECT }}
          WINDOWS_SIGNER_ISSUER: ${{ vars.ENGINE_WINDOWS_SIGNER_ISSUER }}
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONNOUSERSITE: "1"
        run: |
          $archive = (Resolve-Path "signed-release/amw-engine-${{ matrix.bundle }}.zip").Path
          $bootstrapRoot = Join-Path $env:RUNNER_TEMP "amw-export-bootstrap-${{ matrix.bundle }}"
          if (Test-Path -LiteralPath $bootstrapRoot) { throw "release-bootstrap probe root already exists" }
          New-Item -ItemType Directory -Path $bootstrapRoot | Out-Null
          Expand-Archive -LiteralPath $archive -DestinationPath $bootstrapRoot
          $innerManifestSha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath (Join-Path $bootstrapRoot "manifest.json")).Hash.ToLowerInvariant()
          $executables = @(Get-ChildItem -LiteralPath $bootstrapRoot -Filter *.exe -File)
          if ($executables.Count -ne 3) { throw "downloaded bundle does not contain exactly three signed executables" }
          foreach ($file in $executables) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file.FullName
            if ($signature.Status -ne "Valid") { throw "downloaded signature is invalid for $($file.Name): $($signature.Status)" }
            if ($null -eq $signature.SignerCertificate) { throw "downloaded signer certificate is missing for $($file.Name)" }
            if ($signature.SignerCertificate.Subject -cne $env:WINDOWS_SIGNER_SUBJECT) {
              throw "downloaded signer subject is invalid for $($file.Name): $($signature.SignerCertificate.Subject)"
            }
            if ($signature.SignerCertificate.Issuer -cne $env:WINDOWS_SIGNER_ISSUER) {
              throw "downloaded signer issuer is invalid for $($file.Name): $($signature.SignerCertificate.Issuer)"
            }
            if (-not ($signature.SignerCertificate.EnhancedKeyUsageList.ObjectId.Value -contains "1.3.6.1.5.5.7.3.3")) {
              throw "downloaded signer certificate lacks the code-signing EKU for $($file.Name)"
            }
          }
          $converterPython = (Resolve-Path "signed-validator-venv/Scripts/python.exe").Path
          python scripts/probe_engine_export_toolchain.py `
            --converter-python $converterPython `
            --bootstrap-bundle-root $bootstrapRoot `
            --bootstrap-platform windows `
            --bootstrap-accelerator "${{ matrix.accel }}" `
            --bootstrap-inner-manifest-sha256 $innerManifestSha256 `
            --bootstrap-source-commit "${{ github.sha }}" `
            --expected-interpreter-closure "signed-release/signed-validator-interpreter-closure-${{ matrix.bundle }}.json" `
            --expected-interpreter-closure-objects "signed-release/signed-validator-interpreter-closure-${{ matrix.bundle }}.objects.zip" `
            --receipt "signed-release/release-bootstrap-export-toolchain-${{ matrix.bundle }}.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: validated-release-bootstrap-export-toolchain-${{ matrix.bundle }}
          path: |
            signed-release/release-bootstrap-export-toolchain-${{ matrix.bundle }}.json
            signed-release/release-bootstrap-export-toolchain-${{ matrix.bundle }}.evidence.zip
          if-no-files-found: error

  assemble-release:
    name: Validate and attest release identity
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release && startsWith(github.ref, 'refs/tags/v')
    needs: [build, cuda-certification-binding, sign-windows, validate-signed-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: engine-linux-cpu
          path: release-assets
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: engine-linux-cuda
          path: release-assets
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: release-engine-windows-cpu
          path: release-assets
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: release-engine-windows-cuda
          path: release-assets
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: engine-cuda-certification
          path: release-assets
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: validated-release-bootstrap-export-toolchain-windows-cpu
          path: release-bootstrap-receipts/windows-cpu
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: validated-release-bootstrap-export-toolchain-windows-cuda
          path: release-bootstrap-receipts/windows-cuda
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: protected-signed-validator-interpreter-closure-windows-cpu
          path: release-bootstrap-interpreter-closures/windows-cpu
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: protected-signed-validator-interpreter-closure-windows-cuda
          path: release-bootstrap-interpreter-closures/windows-cuda
      - name: Assert flat downloaded handoffs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("release-assets")
          expected = {
              f"amw-engine-{platform}-{accel}.zip"
              for platform in ("windows", "linux")
              for accel in ("cpu", "cuda")
          } | {
              f"manifest-{platform}-{accel}.json"
              for platform in ("windows", "linux")
              for accel in ("cpu", "cuda")
          } | {"cuda-certification.json"}
          actual = {path.relative_to(root).as_posix() for path in root.rglob("*") if path.is_file()}
          if actual != expected:
              raise SystemExit(f"downloaded release handoffs are not flat and exact: {sorted(actual)}")
          PY
      - name: Validate signed Windows export bootstrap receipts
        shell: bash
        run: |
          python scripts/validate_engine_release.py bootstrap-receipts \
            --release-root release-assets \
            --receipts-root release-bootstrap-receipts \
            --closures-root release-bootstrap-interpreter-closures \
            --expected-commit "${{ github.sha }}"
      - name: Merge and validate every provenance leg
        shell: bash
        env:
          EXPECTED_REPOSITORY: ${{ github.repository }}
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REF: ${{ github.ref }}
          EXPECTED_WORKFLOW: ${{ github.workflow_ref }}
          EXPECTED_RUN_ID: ${{ github.run_id }}
        run: |
          python scripts/validate_engine_release.py merge \
            --root release-assets \
            --output release-assets/manifest.json
          python - <<'PY'
          import hashlib, json, os, re
          from pathlib import Path

          root = Path("release-assets")
          fragments = [json.loads(path.read_text(encoding="utf-8")) for path in sorted(root.glob("manifest-*.json"))]
          if len(fragments) != 4:
              raise SystemExit(f"expected four manifest fragments, found {len(fragments)}")
          expected_legs = {
              "amw-engine-windows-cpu.zip": ("windows", "cpu", "windows-latest", "cpu", "not-applicable"),
              "amw-engine-windows-cuda.zip": ("windows", "cuda", "windows-latest", "cuda", "12.4.1"),
              "amw-engine-linux-cpu.zip": ("linux", "cpu", "ubuntu-latest", "cpu", "not-applicable"),
              "amw-engine-linux-cuda.zip": ("linux", "cuda", "ubuntu-latest", "cuda", "12.4.1"),
          }
          expected_identity = {
              "repository": os.environ["EXPECTED_REPOSITORY"],
              "source_commit": os.environ["EXPECTED_COMMIT"],
              "source_ref": os.environ["EXPECTED_REF"],
              "workflow": os.environ["EXPECTED_WORKFLOW"],
              "run_id": os.environ["EXPECTED_RUN_ID"],
          }
          provenance_fields = set(expected_identity) | {"runner", "feature", "toolchain", "cuda", "deterministic_flags", "rebuild_inputs"}
          identities = set()
          artifacts = []
          flags_by_artifact = {}
          inputs_by_artifact = {}
          for fragment in fragments:
              if set(fragment) != {"engine_version", "libllama_rev", "min_pkg_version", "artifacts", "provenance"}:
                  raise SystemExit("manifest fragment fields are invalid")
              if not isinstance(fragment["artifacts"], list) or len(fragment["artifacts"]) != 1:
                  raise SystemExit("manifest fragment must contain one artifact")
              artifact = fragment["artifacts"][0]
              if set(artifact) != {"platform", "accel", "file", "sha256", "size_bytes"}:
                  raise SystemExit("manifest fragment artifact fields are invalid")
              filename = artifact["file"]
              if filename not in expected_legs:
                  raise SystemExit(f"unexpected release artifact {filename!r}")
              platform, accel, runner, feature, cuda = expected_legs[filename]
              if (artifact["platform"], artifact["accel"]) != (platform, accel):
                  raise SystemExit(f"selector mismatch for {filename}")
              archive = root / filename
              if not archive.is_file() or archive.stat().st_size != artifact["size_bytes"]:
                  raise SystemExit(f"size mismatch for {filename}")
              if hashlib.sha256(archive.read_bytes()).hexdigest() != artifact["sha256"]:
                  raise SystemExit(f"digest mismatch for {filename}")
              provenance = fragment["provenance"]
              if not isinstance(provenance, dict) or set(provenance) != provenance_fields:
                  raise SystemExit(f"provenance fields are invalid for {filename}")
              if any(provenance[key] != value for key, value in expected_identity.items()):
                  raise SystemExit(f"workflow identity mismatch for {filename}")
              if (provenance["runner"], provenance["feature"], provenance["cuda"]) != (runner, feature, cuda):
                  raise SystemExit(f"matrix provenance mismatch for {filename}")
              if provenance["toolchain"] != {"rust": "1.88.0", "cuda": "12.4.1"}:
                  raise SystemExit(f"toolchain mismatch for {filename}")
              flags = provenance["deterministic_flags"]
              required_flags = {"SOURCE_DATE_EPOCH=1722470400", "ARFLAGS=crD", "normalized-zip-timestamp"}
              if not isinstance(flags, list) or not required_flags.issubset(flags) or len(flags) != len(set(flags)):
                  raise SystemExit(f"deterministic flag set is invalid for {filename}")
              if platform == "windows" and not any("/Brepro" in value for value in flags):
                  raise SystemExit(f"Windows reproducibility flag is absent for {filename}")
              if platform == "linux" and not any("--build-id=none" in value for value in flags):
                  raise SystemExit(f"Linux reproducibility flag is absent for {filename}")
              rebuild_inputs = provenance["rebuild_inputs"]
              required_materials = {
                  "source_tree",
                  "cargo_lock_sha256",
                  "workspace_manifest_sha256",
                  "engine_manifest_sha256",
                  "engine_build_sha256",
                  "vendor_tree_sha256",
                  "vendor_license_sha256",
                  "converter_requirements_sha256",
                  "native_fixture_model_url",
                  "native_fixture_model_sha256",
                  "native_fixture_license_url",
                  "native_fixture_license_sha256",
                  "fim_fixture_model_url",
                  "fim_fixture_model_revision",
                  "fim_fixture_model_sha256",
                  "fim_fixture_model_size_bytes",
                  "fim_fixture_license_url",
                  "fim_fixture_license_sha256",
              }
              if not isinstance(rebuild_inputs, dict) or set(rebuild_inputs) != required_materials:
                  raise SystemExit(f"rebuild inputs are invalid for {filename}")
              digest_fields = required_materials - {"source_tree", "native_fixture_model_url", "native_fixture_license_url", "fim_fixture_model_url", "fim_fixture_model_revision", "fim_fixture_model_size_bytes", "fim_fixture_license_url"}
              if not re.fullmatch(r"[0-9a-f]{40}", rebuild_inputs["source_tree"]):
                  raise SystemExit(f"source tree identity is invalid for {filename}")
              if any(not isinstance(rebuild_inputs[field], str) or not re.fullmatch(r"[0-9a-f]{64}", rebuild_inputs[field]) for field in digest_fields):
                  raise SystemExit(f"measured material digest is invalid for {filename}")
              if rebuild_inputs["native_fixture_model_url"] != "https://huggingface.co/tensorblock/tinyllama-15M-stories-GGUF/resolve/51b755181aac158c3ee689c0bd86f49a8291d1da/tinyllama-15M-stories-Q2_K.gguf":
                  raise SystemExit(f"fixture model identity is invalid for {filename}")
              if rebuild_inputs["native_fixture_license_url"] != "https://huggingface.co/tensorblock/tinyllama-15M-stories-GGUF/resolve/51b755181aac158c3ee689c0bd86f49a8291d1da/README.md":
                  raise SystemExit(f"fixture license identity is invalid for {filename}")
              if rebuild_inputs["fim_fixture_model_url"] != "https://huggingface.co/Qwen/Qwen2.5-Coder-0.5B-Instruct-GGUF/resolve/ebb2015119c907b064c512bf053e945850b5875f/qwen2.5-coder-0.5b-instruct-q2_k.gguf":
                  raise SystemExit(f"FIM fixture model URL is invalid for {filename}")
              if rebuild_inputs["fim_fixture_model_revision"] != "ebb2015119c907b064c512bf053e945850b5875f":
                  raise SystemExit(f"FIM fixture revision is invalid for {filename}")
              if rebuild_inputs["fim_fixture_model_sha256"] != "f9bddf294ef15c80bb64a2cdcf15d5b25caf88fb4f4a12383bc9f7a01a09c2e3" or rebuild_inputs["fim_fixture_model_size_bytes"] != 415182720:
                  raise SystemExit(f"FIM fixture model bytes are invalid for {filename}")
              if rebuild_inputs["fim_fixture_license_url"] != "https://huggingface.co/Qwen/Qwen2.5-Coder-0.5B-Instruct-GGUF/resolve/ebb2015119c907b064c512bf053e945850b5875f/LICENSE" or rebuild_inputs["fim_fixture_license_sha256"] != "832dd9e00a68dd83b3c3fb9f5588dad7dcf337a0db50f7d9483f310cd292e92e":
                  raise SystemExit(f"FIM fixture license identity is invalid for {filename}")
              identities.add((fragment["engine_version"], fragment["libllama_rev"], fragment["min_pkg_version"]))
              artifacts.append(artifact)
              flags_by_artifact[filename] = flags
              inputs_by_artifact[filename] = rebuild_inputs
          if len(identities) != 1 or set(flags_by_artifact) != set(expected_legs):
              raise SystemExit("release fragments do not form one complete build identity")
          if len({json.dumps(value, sort_keys=True) for value in inputs_by_artifact.values()}) != 1:
              raise SystemExit("release legs disagree on measured source and material identity")
          engine_version, llama_rev, min_pkg = identities.pop()
          if os.environ["EXPECTED_REF"] != f"refs/tags/v{engine_version}":
              raise SystemExit("engine version does not match the release tag")
          manifest = {
              "engine_version": engine_version,
              "libllama_rev": llama_rev,
              "min_pkg_version": min_pkg,
              "artifacts": sorted(artifacts, key=lambda row: row["file"]),
              "provenance": {
                  **expected_identity,
                  "toolchain": {"rust": "1.88.0", "cuda": "12.4.1"},
                  "deterministic_flags": flags_by_artifact,
                  "rebuild_inputs": inputs_by_artifact,
              },
          }
          (root / "manifest.json").write_text(json.dumps(manifest, sort_keys=True, indent=2), encoding="utf-8")
          PY
          python scripts/validate_engine_release.py merge \
            --root release-assets \
            --output release-assets/manifest.json
      - name: Extract and validate artifact-specific SPDX predicates
        run: |
          python scripts/validate_engine_release.py extract-sboms \
            --root release-assets \
            --output release-sboms
      - name: Generate identity-bound Sigstore build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: |
            release-assets/manifest.json
            release-assets/consumer-release-authority.json
            release-assets/cuda-certification.json
            release-assets/amw-engine-*.zip
      - name: Attest Windows CPU SPDX
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: release-assets/amw-engine-windows-cpu.zip
          sbom-path: release-sboms/amw-engine-windows-cpu.spdx.json
      - name: Attest Windows CUDA SPDX
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: release-assets/amw-engine-windows-cuda.zip
          sbom-path: release-sboms/amw-engine-windows-cuda.spdx.json
      - name: Attest Linux CPU SPDX
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: release-assets/amw-engine-linux-cpu.zip
          sbom-path: release-sboms/amw-engine-linux-cpu.spdx.json
      - name: Attest Linux CUDA SPDX
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: release-assets/amw-engine-linux-cuda.zip
          sbom-path: release-sboms/amw-engine-linux-cuda.spdx.json
      - name: Stage flat publisher handoff
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          from pathlib import Path

          source = Path("release-assets")
          root = Path("publish-handoff")
          root.mkdir()
          for path in sorted(source.glob("amw-engine-*.zip")) + [source / "consumer-release-authority.json", source / "cuda-certification.json", source / "manifest.json"]:
              shutil.copy2(path, root / path.name)
          expected = {
              "manifest.json",
              "consumer-release-authority.json",
              "cuda-certification.json",
              "amw-engine-windows-cpu.zip",
              "amw-engine-windows-cuda.zip",
              "amw-engine-linux-cpu.zip",
              "amw-engine-linux-cuda.zip",
          }
          actual = {path.name for path in root.iterdir() if path.is_file()}
          if actual != expected or any(path.is_dir() for path in root.iterdir()):
              raise SystemExit(f"publisher handoff is not flat and exact: {sorted(actual)}")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: attested-engine-release
          path: publish-handoff
          if-no-files-found: error
      - name: Stage release validator for the source-free publisher
        shell: bash
        run: |
          mkdir validator-handoff
          cp scripts/validate_engine_release.py validator-handoff/validate_engine_release.py
          test "$(find validator-handoff -maxdepth 1 -type f | wc -l)" = "1"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: engine-release-validator
          path: validator-handoff
          if-no-files-found: error

  publish:
    name: Publish immutable engine release
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release && startsWith(github.ref, 'refs/tags/v')
    needs: assemble-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: engine-release-publish
    concurrency:
      group: engine-release-publish-${{ github.repository_id }}-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: attested-engine-release
          path: release-assets
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: engine-release-validator
          path: release-validator
      - name: Assert flat publisher input
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("release-assets")
          expected = {
              "manifest.json",
              "consumer-release-authority.json",
              "cuda-certification.json",
              "amw-engine-windows-cpu.zip",
              "amw-engine-windows-cuda.zip",
              "amw-engine-linux-cpu.zip",
              "amw-engine-linux-cuda.zip",
          }
          actual = {path.relative_to(root).as_posix() for path in root.rglob("*") if path.is_file()}
          if actual != expected:
              raise SystemExit(f"publisher input is not flat and exact: {sorted(actual)}")
          PY
      - name: Require protected exclusive publisher identity contract
        shell: bash
        env:
          EXCLUSIVE_WRITER_ENABLED: ${{ vars.ENGINE_RELEASE_EXCLUSIVE_WRITER_ENABLED }}
          EXPECTED_ACTOR: ${{ vars.ENGINE_RELEASE_EXPECTED_ACTOR }}
          EXPECTED_UPLOADER: ${{ vars.ENGINE_RELEASE_EXPECTED_UPLOADER }}
        run: |
          test "$EXCLUSIVE_WRITER_ENABLED" = "true" || { echo "exclusive release writer contract is not enabled" >&2; exit 1; }
          test -n "$EXPECTED_ACTOR" && test "$GITHUB_ACTOR" = "$EXPECTED_ACTOR" || { echo "workflow actor does not match the protected publisher identity" >&2; exit 1; }
          [[ "$EXPECTED_UPLOADER" =~ ^[A-Za-z0-9_.-]+(\[bot\])?$ ]] || { echo "protected release uploader identity is unavailable or invalid" >&2; exit 1; }
      - name: Fail closed on repository immutability and peeled release tag
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ENGINE_RELEASE_ADMIN_TOKEN }}
          EXPECTED_COMMIT: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          test -n "$GH_TOKEN" || { echo "ENGINE_RELEASE_ADMIN_TOKEN is required for the immutable-release preflight" >&2; exit 1; }
          test "$(gh api -H 'X-GitHub-Api-Version: 2026-03-10' "repos/$REPOSITORY/immutable-releases" --jq .enabled)" = "true"
          remote="https://github.com/$REPOSITORY.git"
          rows="$(git ls-remote --exit-code "$remote" "refs/tags/$RELEASE_TAG" "refs/tags/$RELEASE_TAG^{}")"
          peeled="$(printf '%s\n' "$rows" | awk -v ref="refs/tags/$RELEASE_TAG^{}" '$2 == ref {print $1}')"
          if [[ -z "$peeled" ]]; then
            peeled="$(printf '%s\n' "$rows" | awk -v ref="refs/tags/$RELEASE_TAG" '$2 == ref {print $1}')"
          fi
          [[ "$peeled" =~ ^[0-9a-f]{40}$ && "$peeled" == "$EXPECTED_COMMIT" ]] || {
            echo "peeled remote tag $RELEASE_TAG does not equal github.sha" >&2
            exit 1
          }
      - name: Bind one exact empty draft release ID
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_UPLOADER: ${{ vars.ENGINE_RELEASE_EXPECTED_UPLOADER }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh api -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$REPOSITORY/releases/tags/$RELEASE_TAG" > release-by-tag.json
          python release-validator/validate_engine_release.py bind-draft \
            --metadata release-by-tag.json \
            --output release-binding.json \
            --repository "$REPOSITORY" \
            --expected-tag "$RELEASE_TAG" \
            --expected-commit "$EXPECTED_COMMIT" \
            --expected-uploader "$EXPECTED_UPLOADER" \
            --github-env "$GITHUB_ENV"
      - name: Upload release assets directly to the bound release ID
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          for asset in release-assets/amw-engine-linux-cpu.zip release-assets/amw-engine-linux-cuda.zip release-assets/amw-engine-windows-cpu.zip release-assets/amw-engine-windows-cuda.zip release-assets/consumer-release-authority.json release-assets/cuda-certification.json release-assets/manifest.json; do
            name="$(basename "$asset")"
            curl --fail --silent --show-error --location --request POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2026-03-10' \
              -H 'Content-Type: application/octet-stream' \
              --data-binary "@$asset" \
              "https://uploads.github.com/repos/$REPOSITORY/releases/$RELEASE_ID/assets?name=$name" >/dev/null
          done
      - name: Capture exact uploaded asset IDs and identities
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh api -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$REPOSITORY/releases/$RELEASE_ID" > uploaded-release-by-id.json
          python release-validator/validate_engine_release.py capture-draft-assets \
            --root release-assets \
            --metadata uploaded-release-by-id.json \
            --binding release-binding.json \
            --output release-binding-assets.json
      - name: Revalidate the bound release ID immediately before publish
        shell: bash
        env:
          ADMIN_GH_TOKEN: ${{ secrets.ENGINE_RELEASE_ADMIN_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: ${{ github.sha }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          test -n "$ADMIN_GH_TOKEN" || { echo "ENGINE_RELEASE_ADMIN_TOKEN is required for the immutable-release preflight" >&2; exit 1; }
          test "$(GH_TOKEN="$ADMIN_GH_TOKEN" gh api -H 'X-GitHub-Api-Version: 2026-03-10' "repos/$REPOSITORY/immutable-releases" --jq .enabled)" = "true"
          rows="$(git ls-remote --exit-code "https://github.com/$REPOSITORY.git" "refs/tags/$RELEASE_TAG" "refs/tags/$RELEASE_TAG^{}")"
          peeled="$(printf '%s\n' "$rows" | awk -v ref="refs/tags/$RELEASE_TAG^{}" '$2 == ref {print $1}')"
          if [[ -z "$peeled" ]]; then
            peeled="$(printf '%s\n' "$rows" | awk -v ref="refs/tags/$RELEASE_TAG" '$2 == ref {print $1}')"
          fi
          [[ "$peeled" =~ ^[0-9a-f]{40}$ && "$peeled" == "$EXPECTED_COMMIT" ]] || {
            echo "peeled remote tag $RELEASE_TAG changed after asset upload" >&2
            exit 1
          }
          gh api -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$REPOSITORY/releases/$RELEASE_ID" > prepublish-release-by-id.json
          python release-validator/validate_engine_release.py verify-bound-draft \
            --root release-assets \
            --metadata prepublish-release-by-id.json \
            --binding release-binding-assets.json
      - name: Publish the bound release ID without tag re-resolution
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh api --method PATCH -H 'X-GitHub-Api-Version: 2026-03-10' \
            -F draft=false \
            "repos/$REPOSITORY/releases/$RELEASE_ID" > publish-response-by-id.json
      - name: Prove same-ID immutable publication and tag mapping
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh api -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$REPOSITORY/releases/$RELEASE_ID" > published-release-by-id.json
          gh api -H 'X-GitHub-Api-Version: 2026-03-10' \
            "repos/$REPOSITORY/releases/tags/$RELEASE_TAG" > published-release-by-tag.json
          python release-validator/validate_engine_release.py verify-published \
            --binding release-binding-assets.json \
            --id-metadata published-release-by-id.json \
            --tag-metadata published-release-by-tag.json

  verify-release:
    name: Verify immutable release and re-downloaded assets
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release && startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install CUDA runtime for re-downloaded CUDA executable validation
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76
        with:
          cuda: 12.4.1
          method: network
      - name: Verify GitHub release attestation and immutability
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(gh api "repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" --jq .immutable)" = "true"
          gh release verify "${{ github.ref_name }}"
      - name: Download and verify every published asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" --pattern 'amw-engine-*.zip' --pattern consumer-release-authority.json --pattern cuda-certification.json --pattern manifest.json --dir verified-release
          for asset in verified-release/amw-engine-*.zip verified-release/consumer-release-authority.json verified-release/cuda-certification.json verified-release/manifest.json; do
            gh release verify-asset "${{ github.ref_name }}" "$asset"
          done
          for asset in verified-release/consumer-release-authority.json verified-release/cuda-certification.json verified-release/manifest.json; do
            gh attestation verify "$asset" \
              --repo "${{ github.repository }}"
          done
          for asset in verified-release/amw-engine-*.zip; do
            gh attestation verify "$asset" \
              --repo "${{ github.repository }}" \
              --predicate-type https://spdx.dev/Document/v2.3
          done
      - name: Verify the re-downloaded manifest contract
        shell: bash
        env:
          EXPECTED_REPOSITORY: ${{ github.repository }}
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_REF: ${{ github.ref }}
          EXPECTED_WORKFLOW: ${{ github.workflow_ref }}
          EXPECTED_RUN_ID: ${{ github.run_id }}
        run: |
          python scripts/validate_engine_release.py release-directory --root verified-release
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path

          root = Path("verified-release")
          manifest = json.loads((root / "manifest.json").read_text(encoding="utf-8"))
          if set(manifest) != {"engine_version", "libllama_rev", "min_pkg_version", "artifacts", "evidence", "provenance"}:
              raise SystemExit("published manifest fields are invalid")
          expected_identity = {
              "repository": os.environ["EXPECTED_REPOSITORY"],
              "source_commit": os.environ["EXPECTED_COMMIT"],
              "source_ref": os.environ["EXPECTED_REF"],
              "workflow": os.environ["EXPECTED_WORKFLOW"],
              "run_id": os.environ["EXPECTED_RUN_ID"],
          }
          if any(manifest["provenance"].get(key) != value for key, value in expected_identity.items()):
              raise SystemExit("published manifest workflow identity is invalid")
          if len(manifest["artifacts"]) != 4:
              raise SystemExit("published manifest does not contain four bundles")
          for row in manifest["artifacts"]:
              path = root / row["file"]
              if path.stat().st_size != row["size_bytes"]:
                  raise SystemExit(f"published size mismatch for {path.name}")
              if hashlib.sha256(path.read_bytes()).hexdigest() != row["sha256"]:
                  raise SystemExit(f"published digest mismatch for {path.name}")
          PY
      - name: Repeat packaged Linux executable smokes after re-download
        shell: bash
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          with zipfile.ZipFile("verified-release/amw-engine-linux-cpu.zip") as bundle:
              Path("verified-converter-requirements.txt").write_bytes(
                  bundle.read("requirements-convert_lora_to_gguf.txt")
              )
          PY
          python -m venv verified-converter-venv
          converter_python="$(python -c 'from pathlib import Path; print(Path("verified-converter-venv/bin/python").resolve())')"
          "$converter_python" -m pip install \
            --disable-pip-version-check \
            --no-cache-dir \
            --require-hashes \
            --only-binary=:all: \
            --requirement verified-converter-requirements.txt
          python scripts/validate_engine_release.py archive \
            --archive verified-release/amw-engine-linux-cpu.zip \
            --platform linux \
            --accelerator cpu \
            --converter-python "$converter_python" \
            --run-smokes
          python scripts/validate_engine_release.py archive \
            --archive verified-release/amw-engine-linux-cuda.zip \
            --platform linux \
            --accelerator cuda \
            --converter-python "$converter_python" \
            --run-smokes

  verify-release-windows:
    name: Repeat packaged ${{ matrix.bundle }} validation after re-download
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release && startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle: windows-cpu
            accel: cpu
          - bundle: windows-cuda
            accel: cuda
    steps:
      - name: Enable Windows long paths before checkout
        shell: pwsh
        run: git config --global core.longpaths true
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install CUDA runtime for re-downloaded CUDA executable validation
        if: matrix.accel == 'cuda'
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76
        with:
          cuda: 12.4.1
          method: network
      - name: Download and cryptographically verify Windows asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" --pattern "amw-engine-${{ matrix.bundle }}.zip" --dir verified-windows
          $archive = Resolve-Path "verified-windows/amw-engine-${{ matrix.bundle }}.zip"
          gh release verify-asset "${{ github.ref_name }}" $archive
          gh attestation verify $archive --repo "${{ github.repository }}" --predicate-type https://spdx.dev/Document/v2.3
      - name: Repeat exact packaged Windows validation
        shell: pwsh
        run: |
          @'
          import zipfile
          from pathlib import Path

          with zipfile.ZipFile("verified-windows/amw-engine-${{ matrix.bundle }}.zip") as bundle:
              Path("verified-windows-requirements.txt").write_bytes(
                  bundle.read("requirements-convert_lora_to_gguf.txt")
              )
          '@ | python -
          python -m venv verified-windows-venv
          $converterPython = (Resolve-Path "verified-windows-venv/Scripts/python.exe").Path
          & $converterPython -m pip install --disable-pip-version-check --no-cache-dir --require-hashes --only-binary=:all: --requirement verified-windows-requirements.txt
          python scripts/validate_engine_release.py archive `
            --archive "verified-windows/amw-engine-${{ matrix.bundle }}.zip" `
            --platform windows `
            --accelerator "${{ matrix.accel }}" `
            --converter-python $converterPython `
            --run-smokes

  macos-pilot:
    # Decision-Ref: ADR-0165. This pilot is never selected by a default trigger.
    if: github.event_name == 'workflow_dispatch' && inputs.macos_pilot && !inputs.publish_release
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.88.0
      - run: cargo test -p amw-engine --features cpu --locked
