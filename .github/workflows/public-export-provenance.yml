name: Protected public export provenance

on:
  pull_request_target:

permissions:
  contents: read

jobs:
  protected-provenance:
    name: Protected export provenance (trusted base)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: public-export-validation
    env:
      EXPECTED_SOURCE_COMMIT: ${{ vars.PUBLIC_EXPORT_SOURCE_COMMIT }}
      EXPECTED_SOURCE_TREE: ${{ vars.PUBLIC_EXPORT_SOURCE_TREE }}
      EXPECTED_PAYLOAD_SHA256: ${{ vars.PUBLIC_EXPORT_PAYLOAD_SHA256 }}
    steps:
      - name: Check out trusted verifier from the protected base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          path: trusted
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Check out untrusted candidate as data only
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          path: candidate
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Verify candidate with protected code and provenance
        run: >-
          python -B trusted/scripts/check_public_export_manifest.py
          --root candidate
          --require-external-provenance
          --expected-source-commit "$EXPECTED_SOURCE_COMMIT"
          --expected-source-tree "$EXPECTED_SOURCE_TREE"
          --expected-payload-sha256 "$EXPECTED_PAYLOAD_SHA256"
