name: Training exit hatch - degraded-performance

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: training-exit-hatch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  vanilla-training-proof:
    name: Vanilla TRL degraded-performance proof
    runs-on: [self-hosted, vetinari-engine-gpu, linux, x64]
    timeout-minutes: 90
    env:
      HF_HUB_DISABLE_TELEMETRY: "1"
      TOKENIZERS_PARALLELISM: "false"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install governed vanilla proof environment
        run: |
          python -m venv "${RUNNER_TEMP}/training-exit-hatch-venv"
          echo "${RUNNER_TEMP}/training-exit-hatch-venv/bin" >> "${GITHUB_PATH}"
          mapfile -t governed_specs < <(
            "${RUNNER_TEMP}/training-exit-hatch-venv/bin/python" - <<'PY'
          import tomllib
          from pathlib import Path

          extras = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["optional-dependencies"]
          print(next(item for item in extras["training"] if item.lower().startswith("torch")))
          print(next(item for item in extras["redteam"] if item.lower().startswith("jsonschema")))
          PY
          )
          "${RUNNER_TEMP}/training-exit-hatch-venv/bin/python" -m pip install \
            --disable-pip-version-check --editable ".[training,dev]" "${governed_specs[1]}"
          "${RUNNER_TEMP}/training-exit-hatch-venv/bin/python" -m pip install \
            --disable-pip-version-check --force-reinstall --no-deps \
            "${governed_specs[0]}" --index-url https://download.pytorch.org/whl/cu128
      - name: Prove Unsloth is absent
        run: |
          python -c "import importlib.util,sys; sys.exit('unsloth present; exit-hatch lane invalid' if importlib.util.find_spec('unsloth') else 0)"
      - name: Check the coordinated dependency lattice
        run: python scripts/check_training_version_lattice.py
      - name: Run focused fail-closed controls
        env:
          VETINARI_USER_DIR: ${{ runner.temp }}/training-exit-hatch-focused/user
          VETINARI_DATA_ROOT: ${{ runner.temp }}/training-exit-hatch-focused/data
          VETINARI_MODELS_DIR: ${{ runner.temp }}/training-exit-hatch-focused/models
          VETINARI_NATIVE_MODELS_DIR: ${{ runner.temp }}/training-exit-hatch-focused/native-models
        run: >-
          python -m pytest tests/test_training_unsloth_absent.py
          tests/test_check_training_version_lattice.py -n 0 --noconftest
      - name: Run the real vanilla training lifecycle
        run: >-
          python scripts/run_training_exit_hatch_proof.py
          --output-dir "${{ runner.temp }}/training-exit-hatch"
          --receipt "${{ runner.temp }}/training-exit-hatch-receipt.json"
      - name: Validate degraded-performance receipt
        run: |
          python -c "import json,pathlib; p=json.loads(pathlib.Path(r'${{ runner.temp }}/training-exit-hatch-receipt.json').read_text(encoding='utf-8')); assert p['performance_mode']=='degraded-performance' and p['acceleration_state']=='unsloth-absent' and p['training_backend']=='trl' and p['loss_decreased'] and p['quality_gate']=='deploy' and p['pipeline_success']"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: training-exit-hatch-degraded-performance
          path: ${{ runner.temp }}/training-exit-hatch-receipt.json
          if-no-files-found: error
          retention-days: 30
