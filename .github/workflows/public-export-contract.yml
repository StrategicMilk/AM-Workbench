name: Public export contract

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: public-export-contract-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  advertised-api:
    name: Advertised Python API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - name: Install public runtime
        run: python -m pip install --disable-pip-version-check ".[core]"
      - name: Validate advertised exports without mutating the checkout
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONNOUSERSITE: "1"
        run: python -B scripts/check_all_exports.py
