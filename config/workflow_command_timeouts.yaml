# Workflow command timeout registry: an explicit, deliberate timeout for every command
# any suite driver (program / audit / brainstorm / kaizen) runs. There is NO generic
# default that silently absorbs untuned commands. Enforcement is hard, not advisory:
#   - scripts/workflow_command_manifest.py HARD-FAILS (non-zero exit, no silent fallback)
#     when asked to run a command that is not classified below.
#   - scripts/check_workflow_command_timeouts.py fails closed if the live command surface
#     contains any command missing from this registry.
# This replaces the former single blanket timeout that forced every command to inherit the
# worst-case ceiling. Values are conservative cost classes with generous headroom; tighten
# them from measured durations recorded to outputs/telemetry/workflow-command-durations.jsonl.
schema_version: workflow-command-timeouts.v1

classes:
  quick: 600         # state queries, cache/context/receipt writers, small updaters
  standard: 1200     # per-wave gates, generators, validators, most checks
  heavy: 1800        # full-repo audits, audit lanes, evals, artifact/efficiency scans
  pack_validation: 3600    # one scoped pack-validation command group
  full_suite: 10800        # standalone or wave-boundary full-suite execution (180m)
  validation_rerun: 14400  # outer whole-wave pack-validation rerun (240m)

