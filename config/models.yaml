# ---------------------------------------------------------------------------
# Per-task-type default models — used when no explicit model is selected.
# Fallback chain: task default → agent default → global default → any available.
# ---------------------------------------------------------------------------
task_defaults:
  coding: "qwen2.5-coder-7b"        # Fast coding model for build tasks
  research: "qwen2.5-72b"           # Large context for research and analysis
  reasoning: "qwen2.5-72b"          # Complex reasoning needs capable model
  planning: "qwen2.5-72b"           # Plan decomposition needs strong reasoning
  review: "qwen2.5-coder-7b"        # Code review needs code understanding
  security: "qwen2.5-72b"           # Security audit needs thorough analysis
  documentation: "qwen2.5-coder-7b" # Docs generation can use smaller model
  creative: "qwen2.5-72b"           # Creative tasks benefit from larger model
  classification: "llama-3.2-1b"    # Classification is fast and simple
  general: "qwen2.5-72b"            # Fallback for unclassified tasks

# ---------------------------------------------------------------------------
# Routing policy — local-first, privacy-weighted
# ---------------------------------------------------------------------------
policy:
  local_first: true
  # Weights for scoring: higher = more important
  privacy_weight: 1.0
  latency_weight: 0.5
  cost_weight: 0.3
  # Null = no cloud cost ceiling; set a positive value to cap (e.g. 0.01)
  max_cost_per_1k_tokens: null
  # Provider preference order (first = highest priority)
  preferred_providers:
    - local
    - claude
    - gemini
  # Fallback: if local inference is unavailable, allow cloud escalation
  allow_cloud_fallback: true
  cloud_fallback_trigger: "local_unavailable"

