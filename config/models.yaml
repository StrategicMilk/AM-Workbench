# =============================================================================
# Vetinari Model Configuration
# Hardware: RTX 5090 (32 GB VRAM), 9950X3D CPU, 64 GB DDR5-6000 RAM
# =============================================================================

# ---------------------------------------------------------------------------
# Hardware profile — used by VRAMManager and model routing decisions
# ---------------------------------------------------------------------------
hardware:
  gpu_vram_gb: 32
  system_ram_gb: 64
  cpu_offload_enabled: true
  # RAM available for model CPU-offload after OS + apps
  max_cpu_offload_gb: 30
  # Estimated tokens/sec by model size tier (Q4 on 5090)
  throughput_estimates:
    tiny_1b_3b: 120     # tokens/sec
    small_7b_8b: 70
    medium_14b_15b: 45
    large_30b_32b: 25
    xlarge_70b_72b: 10  # requires partial CPU offload

# ---------------------------------------------------------------------------
# Local inference provider (llama-cpp-python)
# ---------------------------------------------------------------------------
local_inference:
  # Path to directory containing GGUF model files.
  # Override with VETINARI_MODELS_DIR environment variable.
  models_dir: "./models"
  # Number of transformer layers to offload to GPU (-1 = all layers).
  # Override with VETINARI_GPU_LAYERS environment variable.
  gpu_layers: -1
  # Default context window size in tokens for unknown models.
  # Most modern models support 8192+ tokens; 4096 was too conservative.
  # Override with VETINARI_CONTEXT_LENGTH environment variable.
  context_length: 8192
  # CPU RAM (GB) available for layers offloaded when a model exceeds VRAM.
  # Mirrors hardware.max_cpu_offload_gb; set to 0 to disable CPU offload.
  ram_budget_gb: 30
  # Allow partial GPU + CPU split-loading for models larger than VRAM budget.
  # When true, oversized models are loaded with a layer fraction on GPU and
  # the remainder on CPU rather than evicting other models entirely.
  cpu_offload_enabled: true

# ---------------------------------------------------------------------------
# Speculative decoding — accelerates generation via draft model or prompt lookup
# ---------------------------------------------------------------------------
speculative_decoding:
  # Strategy: "draft_model" (use small model as draft), "prompt_lookup" (built-in,
  # no extra VRAM), "auto" (try draft first, fall back to prompt lookup), "disabled"
  strategy: "auto"
  # Number of tokens to predict speculatively per step (PromptLookupDecoding)
  num_pred_tokens: 10
  # Draft model filename (stem, no .gguf). Auto-detected if null.
  draft_model_id: null
  # Agent roles that benefit most from speculative decoding (structured output)
  prioritize_for:
    - "inspector"   # Validation produces structured JSON — high acceptance rate
    - "worker"      # Code generation has repetitive patterns

# ---------------------------------------------------------------------------
# Model routing — how models are managed (loading, swapping, lifecycle)
# ---------------------------------------------------------------------------
model_routing:
  # "internal" = Vetinari manages VRAM directly via VRAMManager
  # "llama-swap" = delegate model loading/unloading to external llama-swap server
  model_router: "internal"
  # URL of the llama-swap server (only used when model_router is "llama-swap")
  router_url: ""  # e.g. "http://localhost:8081"

# ---------------------------------------------------------------------------
# Inference backend configuration — which adapter to use
# ---------------------------------------------------------------------------
inference_backend:
  # Setup-generated configs use hardware-aware ordering:
  # AM Engine routes local work through llama_cpp by default, with
  # openai_server as the server-compatible escape hatch.
  selection_policy: "configured"
  # Project default order before user hardware is known.
  primary: "llama_cpp"
  fallback: "openai_server"
  fallback_order: ["llama_cpp", "openai_server"]
  llama_cpp_use_cases:
    - "explicit_user_preference"
    - "weak_or_no_server_setup"
    - "gguf_only_models"
    - "cpu_ram_vram_offload"
    - "oversized_local_models"
    - "recovery_fallback"
  # Native Hugging Face-format model root for server workflows.
  # Override with VETINARI_NATIVE_MODELS_DIR.
  native_models_dir: "./models/native"
  # Supported model formats per backend
  model_format:
    am_engine: ["gguf"]
    llama_cpp: ["gguf"]
    llama_server: ["gguf"]
    vllm: ["safetensors", "gguf", "awq", "gptq"]  # GPU-only - disabled by default
    nim: ["safetensors", "gguf", "awq", "gptq"]    # GPU-only — no CPU offload

  # NVIDIA NIMs backend — containerized GPU inference (ADR-0066)
  # Requires: NVIDIA NIM container running locally or on network
  # vLLM backend - optional GPU server path, disabled unless explicitly configured.
  vllm:
    enabled: false
    endpoint: "http://localhost:8000"
    gpu_only: true

  nim:
    enabled: false
    endpoint: "http://localhost:8001"  # NIM inference endpoint
    gpu_only: true  # Usually GPU-only
    semantic_cache_enabled: true
    cache_namespace: "vetinari"
    # NIM KV reuse is a server/container setting, not an OpenAI request field.
    # Set true only when the NIM service is actually started with
    # NIM_ENABLE_KV_CACHE_REUSE=1.
    kv_cache_reuse_enabled: false
    kv_cache_host_offload_enabled: null
    supports_cache_salt: false

  # First-party AM Engine runtime — opt-in until the program default-flip pack.
  am_engine:
    enabled: false
    endpoint: null
    binary_path: null
    vision_enabled: false

# ---------------------------------------------------------------------------
# Model tier hierarchy — used by DynamicModelRouter for tier-aware routing
# Tiers define capability bands: routing picks the cheapest tier that meets
# the task's requirements, then escalates if confidence is low.
# ---------------------------------------------------------------------------
model_tiers:
  # Tier 0: Tiny models for classification, extraction, routing (1-3B)
  - tier: 0
    name: "tiny"
    description: "Fast classification and routing (1-3B params)"
    max_params_b: 3
    min_quantization: "q4_k_m"
    preferred_for: ["classification", "extraction", "triage", "routing"]
    cost_per_1k_tokens: 0.0
    latency_hint: "fast"

  # Tier 1: Small models for code generation and quick tasks (7-8B)
  - tier: 1
    name: "small"
    description: "Fast coding and routine tasks (7-8B params)"
    max_params_b: 8
    min_quantization: "q4_k_m"
    preferred_for: ["coding", "quick_review", "documentation"]
    cost_per_1k_tokens: 0.0
    latency_hint: "fast"

  # Tier 2: Medium models for reasoning and planning (14-32B)
  - tier: 2
    name: "medium"
    description: "Strong reasoning and planning (14-32B params)"
    max_params_b: 32
    min_quantization: "q4_k_m"
    preferred_for: ["reasoning", "planning", "analysis", "general"]
    cost_per_1k_tokens: 0.0
    latency_hint: "medium"

  # Tier 3: Large models for complex tasks requiring deep reasoning (70B+)
  - tier: 3
    name: "large"
    description: "Deep reasoning and complex analysis (70B+ params)"
    max_params_b: 999
    min_quantization: "q4_k_m"
    preferred_for: ["complex_reasoning", "research", "security_audit"]
    cost_per_1k_tokens: 0.0
    latency_hint: "slow"
    requires_cpu_offload: true

  # Tier 4: Cloud models for overflow or specialized capabilities
  - tier: 4
    name: "cloud"
    description: "Cloud API models for overflow and special capabilities"
    max_params_b: 999
    preferred_for: ["vision", "long_context", "creative"]
    cost_per_1k_tokens: 0.01
    latency_hint: "medium"
    privacy_level: "public"

