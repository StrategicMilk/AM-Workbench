    compatibility: ">=2026.4,<2027.0"
    declared_tools:
      - run_shell
      - delete_path
    requested_secrets:
      - name: GITHUB_TOKEN
        scope: repo:read
        required: true
    stdio: true
    network: true
    filesystem: true
    dependencies:
      - shell-mcp-runner==0.9.0
      - vulnerable-lib==0.1.0
    dependency_findings:
      - vulnerable-lib has blocked advisory
    overlap_categories:
      - shell
      - filesystem
      - network
      - destructive
    destructive_capabilities:
      - delete_path
    authority_owner: workbench
    risk_verdict:
      status: blocked
      allowed: false
      reasons:
        - shell_or_stdio
        - network_capability
        - destructive_capability
        - native_overlap
        - unsafe_dependency
        - manual_selection_required
