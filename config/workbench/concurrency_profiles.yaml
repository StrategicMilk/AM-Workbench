          max_active: 0
          over_cap_action: deny
        - lane: gpu_embedding_rerank
          label: GPU embedding/rerank burst
          max_active: 1
          burst_active: 2
          over_cap_action: queue
        - lane: cpu_specialist
          label: CPU specialist
          max_active: 8
          batch_after: 3
          over_cap_action: batch
        - lane: agent_orchestration
          label: logical agent orchestration
          max_active: 8
          over_cap_action: queue
        - lane: rag_indexing
          label: RAG indexing
          max_active: 1
          over_cap_action: queue
        - lane: eval_sweep
          label: eval sweep
          max_active: 1
          over_cap_action: approval_required
          requires_approval: true
        - lane: download_materialize
