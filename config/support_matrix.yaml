public_distribution_readiness:
  category_statement:
    status: validated
    artifact: docs/public/release-and-distribution-readiness.md
    claim_boundary: local-first AI workstation category wording and launch packet exist; this is not external publication proof
  public_export_boundary:
    status: experimental
    artifact: scripts/build_public_export.py
    required_followup: run check_publication_boundary.py against the exact export tree before public push
  release_tag:
    status: unsupported
    go_to_market_gap: external_evidence_missing:no_current_public_release_tag
    readiness_reference: docs/public/release-and-distribution-readiness.md
    required_followup: create and verify a real public release tag before claiming release availability
  community_presence:
    status: unsupported
    go_to_market_gap: external_evidence_missing:no_external_community_artifact
    readiness_reference: docs/public/release-and-distribution-readiness.md
    required_followup: publish or cite a durable external community artifact before claiming community presence
  developer_survey_or_tooling_list:
    status: unsupported
    go_to_market_gap: external_evidence_missing:not_submitted_or_listed
    readiness_reference: docs/public/release-and-distribution-readiness.md
    required_followup: submit to a real survey/tooling list and cite the accepted entry before claiming category recognition
  marketplace_distribution:
    status: unsupported
    go_to_market_gap: external_evidence_missing:no_marketplace_listing
    readiness_reference: docs/public/release-and-distribution-readiness.md
    runtime_dependency: mcp_oauth_backed_install_flow
    required_followup: cite an external marketplace entry before claiming marketplace distribution
