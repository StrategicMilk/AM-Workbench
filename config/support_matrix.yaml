schema_version: 1
last_verified: '2026-06-01'
freshness_days: 90
hardware_profile_semantics:
  nvidia_cuda_8gb: minimum detected NVIDIA CUDA VRAM >= 8 GiB
  nvidia_cuda_16gb: minimum detected NVIDIA CUDA VRAM >= 16 GiB
  nvidia_cuda_24gb: minimum detected NVIDIA CUDA VRAM >= 24 GiB
  nvidia_cuda_32gb: 32 GB-class NVIDIA CUDA GPU; minimum detected VRAM >= 31 GiB to account for reserved memory reporting
inference_endpoint_capability_contract:
  status: validated
  support_matrix_version: '1'
  route_receipt_policy:
    redaction: prompt_hash_only
    required_fields:
    - tiers_tried
    - accepted_tier
    - confidence
    - cost_usd
    - fallback_reason
    - provider_health
    - support_matrix_version
  unavailable_provider_behavior: fail_closed_before_execution
  stale_support_matrix_behavior: reject_routing_before_execution
  recovery_behavior: refresh config/model_families.yaml and support_matrix proof, then rerun scripts/check_inference_endpoint_capabilities.py --strict
  proof_commands:
  - python scripts/check_inference_endpoint_capabilities.py --strict
  - python scripts/check_default_routing_and_kaizen.py --strict --routing-only
backend_evidence:
  am_engine:
    status: validated
    verified_on: '2026-07-18'
    local_inference_tiers:
    - hardware: nvidia_cuda_8gb
      os: windows_11
      maturity: validated
      probe_command: python scripts/check_local_inference_backend.py --hardware nvidia_cuda_8gb --os windows_11 --backend am_engine --timeout-s 90
    - hardware: nvidia_cuda_16gb
      os: windows_11
      maturity: validated
      probe_command: python scripts/check_local_inference_backend.py --hardware nvidia_cuda_16gb --os windows_11 --backend am_engine --timeout-s 90
    - hardware: nvidia_cuda_24gb
      os: windows_11
      maturity: validated
      probe_command: python scripts/check_local_inference_backend.py --hardware nvidia_cuda_24gb --os windows_11 --backend am_engine --timeout-s 90
    - hardware: nvidia_cuda_32gb
      os: windows_11
      maturity: validated
      probe_command: python scripts/check_local_inference_backend.py --hardware nvidia_cuda_32gb --os windows_11 --backend am_engine --timeout-s 90
axes:
  hardware:
  - cpu_only
