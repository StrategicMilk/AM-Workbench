# Subscription-plan usage weights for delegation decisions.
#
# These are not API prices. They model relative consumption of weekly/session
# subscription allowances. Fill `weekly_limit_units` when the active subscription
# exposes a usable per-pool limit; leave it null when the vendor keeps limits
# opaque and use the helper output as relative quota pressure only.
# Official consumer subscription docs usually expose percentages/progress bars,
# not exact hard caps, so null limits mean "known shared pool, user-visible
# remaining percent required for exact pressure math."
# `scarcity_weight` is the routing shadow price for token-efficiency decisions:
# 1.0 means neutral; values above 1 preserve a scarce pool; values below 1 spend
# a plentiful pool more readily. Exact percent reporting still needs visible
# usage state, but delegation breakpoints can use these weights.
schema_version: "1"
defaults:
  harness_token_config: config/delegation_harness_tokens.yaml
  harness_output_tokens: 0
  warn_ratio: 0.8
pools:
  anthropic-claude-session:
    session_limit_units: null
    reset_period_hours: 5
    unit: user_visible_session_percent
    scarcity_weight: 1.0
    source: "https://support.claude.com/en/articles/9797557-usage-limit-best-practices"
  anthropic-claude-weekly:
    weekly_limit_units: null
    unit: user_visible_weekly_percent
    scarcity_weight: 1.0
    source: "user-observed Claude shared weekly quota surface; exact published cap not available"
  anthropic-opus-weekly:
    weekly_limit_units: null
    unit: user_visible_weekly_percent
    scarcity_weight: 1.0
    source: "https://support.claude.com/en/articles/9797557-usage-limit-best-practices"
  anthropic-sonnet-weekly:
    weekly_limit_units: null
    unit: user_visible_weekly_percent
    scarcity_weight: 1.0
    source: "https://support.claude.com/en/articles/9797557-usage-limit-best-practices"
  anthropic-haiku-weekly:
    weekly_limit_units: null
    unit: user_visible_weekly_percent
    scarcity_weight: 1.0
    source: "user-observed Claude quota surface; exact published cap not available"
  openai-codex-credits:
    weekly_limit_units: null
    unit: codex_credits
    scarcity_weight: 1.0
    source: "https://help.openai.com/en/articles/20001106-codex-rate-card"
  openai-agentic-usage:
    session_limit_units: null
    weekly_limit_units: null
    unit: user_visible_agentic_usage_percent
    scarcity_weight: 1.0
    source: "https://help.openai.com/en/articles/11369540-using-codex-with-your-chatgpt-plan"
  openai-gpt-5-3-codex:
    session_limit_units: null
    weekly_limit_units: null
    unit: user_visible_model_specific_percent
    scarcity_weight: 1.0
    source: "user-observed Codex model-specific quota surface; exact published cap not available"
  openai-gpt-frontier-weekly:
    weekly_limit_units: null
