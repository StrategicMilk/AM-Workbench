schema_version: "1.0"
rubric_id: "capability-parity-rubric"
stale_after: "2026-08-25"
owner: "audit-suite-pack-0g-capability-parity-rubric"
purpose: >
  Define the maturity dimensions used to compare AM Workbench capabilities on
  equivalent evidence, so downstream parity matrix and audit lanes do not score
  one capability by docs alone and another by runtime proof.
consumers:
  - "audit-suite-pack-0h-parity-matrix-generator"
  - "audit-suite-pack-0i-capability-parity-lane"
  - "audit-suite-pack-0j-backend-parity-lane"
fail_closed_policy:
  missing_config: "Consumers must fail the check instead of assuming default maturity."
  corrupt_config: "Consumers must fail the check and report the YAML parse error."
  missing_dimension_field: "Consumers must fail the check and name the incomplete dimension."
  missing_tier_threshold: "Consumers must fail the check and name the dimension/tier gap."
maturity_tiers:
  - id: "absent"
    score: 0
    name: "Absent"
    threshold: "No usable surface or evidence exists."
  - id: "ad_hoc"
    score: 1
    name: "Ad hoc"
    threshold: "Partial behavior exists, but evidence is manual, narrow, or not repeatable."
  - id: "basic"
    score: 2
    name: "Basic"
    threshold: "The common path works with documented, repeatable evidence."
  - id: "mature"
    score: 3
    name: "Mature"
    threshold: "Common, boundary, and failure paths are covered by executable proof."
  - id: "excellent"
    score: 4
    name: "Excellent"
    threshold: "The surface is production-ready, observable, supportable, and parity-checked."
dimensions:
  - id: "documentation"
    name: "Documentation"
    intent: "Users and operators can understand the capability without reading implementation code."
    measurement_procedure: "Inspect canonical docs, runbooks, examples, and limitations against the live behavior."
    evidence_required:
      - "canonical documentation path"
      - "current invocation or workflow example"
      - "known limitations or non-goals"
    per_tier_thresholds:
      absent: "No discoverable documentation."
      ad_hoc: "Scattered notes exist but omit setup, usage, or limits."
      basic: "Canonical docs cover the happy path and current entrypoint."
      mature: "Docs cover setup, usage, limits, troubleshooting, and failure recovery."
      excellent: "Docs are drift-checked against executable behavior and include operator/user examples."
  - id: "tests"
    name: "Tests"
    intent: "The capability has branch-discriminating regression coverage."
    measurement_procedure: "Run targeted tests and inspect negative/control cases for the capability path."
    evidence_required:
      - "targeted test command"
      - "bad fixture or negative control"
      - "good fixture or expected-good proof"
    per_tier_thresholds:
      absent: "No tests exercise the capability."
      ad_hoc: "Only import, snapshot, or source-text tests exist."
      basic: "Happy-path tests exercise the reachable entrypoint."
      mature: "Tests include boundary, error, and representative negative cases."
      excellent: "Tests prove bad fixtures fail, good fixtures pass, and stale state cannot false-green."
  - id: "ui_surface"
    name: "UI Surface"
    intent: "User-facing workflows expose the capability coherently when a UI is in scope."
    measurement_procedure: "Inspect reachable UI routes/components and verify visible states with browser or component tests."
    evidence_required:
      - "route or component path"
      - "happy-state proof"
      - "loading/empty/error-state proof"
    per_tier_thresholds:
      absent: "No reachable UI exists when users would expect one."
      ad_hoc: "A partial UI exists but is hidden, inconsistent, or lacks state coverage."
      basic: "The main workflow is reachable and usable."
      mature: "The UI covers loading, empty, error, disabled, and success states."
      excellent: "The UI is responsive, accessible, tested, and consistent with product design standards."
  - id: "cli_surface"
    name: "CLI Surface"
    intent: "Operators can run the capability from documented command-line entrypoints where appropriate."
    measurement_procedure: "Run help, dry-run/check, good-input, and bad-input command variants."
    evidence_required:
      - "documented command"
      - "exit-code proof"
      - "bad-input rejection proof"
    per_tier_thresholds:
      absent: "No CLI exists for an operator-facing capability."
      ad_hoc: "A script exists but lacks help, stable arguments, or clear exit codes."
      basic: "The CLI has documented arguments and succeeds on valid input."
      mature: "The CLI has check/dry-run behavior and rejects invalid input with actionable errors."
      excellent: "The CLI is idempotent, automation-safe, and covered by good/bad fixture tests."
  - id: "api_surface"
    name: "API Surface"
    intent: "Programmatic consumers have stable request, response, and error contracts."
    measurement_procedure: "Inspect routes, service functions, schemas, and compatibility tests for the capability."
    evidence_required:
      - "API/schema path"
      - "contract test"
      - "invalid request proof"
    per_tier_thresholds:
      absent: "No programmatic surface exists when downstream code needs one."
      ad_hoc: "The surface is private or shape-unstable."
      basic: "The main request/response path is typed or schema-defined."
      mature: "Validation, compatibility, permissions, and error contracts are tested."
      excellent: "The API has versioning or migration posture and consumer-facing examples."
  - id: "telemetry"
    name: "Telemetry"
    intent: "Important capability activity emits useful, privacy-aware signals."
    measurement_procedure: "Inspect events, metrics, traces, and redaction rules for the capability."
    evidence_required:
      - "event or metric name"
      - "redaction/privacy proof"
      - "emission test or trace sample"
    per_tier_thresholds:
      absent: "No telemetry exists for success or failure."
      ad_hoc: "Unstructured logs exist but omit key outcomes or identifiers."
      basic: "Success and failure emit named signals without sensitive payloads."
      mature: "Telemetry includes duration, outcome, correlation, and bounded cardinality."
      excellent: "Telemetry supports dashboards/alerts and is tested for redaction and absence handling."
  - id: "error_paths"
    name: "Error Paths"
    intent: "Failures are explicit, actionable, and do not leave partial or misleading state."
    measurement_procedure: "Run invalid, missing, timeout, permission, and dependency-failure inputs."
    evidence_required:
      - "negative fixture"
      - "error message"
      - "state-after-failure proof"
    per_tier_thresholds:
      absent: "Failures crash, hang, or silently false-green."
      ad_hoc: "Some errors are caught but messages or state cleanup are inconsistent."
      basic: "Common invalid inputs fail with explicit messages."
      mature: "Dependency, permission, timeout, and partial-write cases fail closed."
      excellent: "Recovery guidance, rollback/idempotency, and regression tests cover major failure classes."
  - id: "empty_states"
    name: "Empty States"
    intent: "No-data and first-run states are intentional rather than broken-looking."
    measurement_procedure: "Run the capability with no records, no configuration, or first-run state."
    evidence_required:
      - "empty input fixture"
      - "expected empty-state output"
      - "next-action guidance"
    per_tier_thresholds:
      absent: "Empty state errors or displays misleading zero data."
      ad_hoc: "Empty state is technically handled but gives no useful next action."
      basic: "Empty state is explicit and non-erroring."
      mature: "Empty state explains the condition and names the next valid action."
      excellent: "Empty state is tested across UI/CLI/API surfaces that expose the capability."
  - id: "accessibility"
    name: "Accessibility"
    intent: "Human-facing surfaces remain usable with keyboard, screen readers, and contrast requirements."
    measurement_procedure: "Verify semantic labels, focus order, keyboard access, motion, and contrast for UI output."
    evidence_required:
      - "accessibility check command or manual checklist"
      - "keyboard/focus proof where UI exists"
      - "contrast or semantic proof where UI exists"
    per_tier_thresholds:
      absent: "No accessibility consideration is documented or tested for a human-facing surface."
      ad_hoc: "Some labels or semantics exist but critical flows are unverified."
      basic: "Primary controls have labels and keyboard reachability."
      mature: "Focus order, errors, contrast, and screen-reader semantics are verified."
      excellent: "Accessibility checks are automated or routinely evidenced for all reachable states."
  - id: "observability"
    name: "Observability"
    intent: "Operators can diagnose capability health without shell access or author memory."
    measurement_procedure: "Inspect logs, metrics, health checks, runbooks, and failure correlation IDs."
    evidence_required:
      - "health or diagnostic signal"
      - "operator-facing runbook"
      - "failure correlation proof"
    per_tier_thresholds:
      absent: "Operators cannot distinguish healthy, degraded, and failed states."
      ad_hoc: "Logs exist but are noisy, incomplete, or not tied to actions."
      basic: "The primary operation reports success/failure with enough context to triage."
      mature: "Health, latency, error rate, and dependency status are observable."
      excellent: "Dashboards/alerts/runbooks support diagnosis and recovery for expected incidents."
  - id: "cost_model"
    name: "Cost Model"
    intent: "The capability exposes resource and money cost drivers before they surprise users."
    measurement_procedure: "Inspect estimates, limits, quotas, token/runtime accounting, and cost telemetry."
    evidence_required:
      - "cost or resource metric"
      - "limit/quota behavior"
      - "over-budget handling proof"
    per_tier_thresholds:
      absent: "No cost or resource accounting exists."
      ad_hoc: "Costs are implicit or only visible after work completes."
      basic: "Primary cost drivers are documented or emitted."
      mature: "Limits, estimates, and over-budget behavior are enforced or clearly reported."
      excellent: "Cost regressions are testable and tied to budgets, alerts, or admission checks."
  - id: "configuration"
    name: "Configuration"
    intent: "Capability configuration is explicit, validated, and drift-resistant."
    measurement_procedure: "Inspect config schema, defaults, validation errors, and stale/corrupt handling."
    evidence_required:
      - "config/schema path"
      - "valid config proof"
      - "invalid config proof"
    per_tier_thresholds:
      absent: "Configuration is hardcoded or undocumented."
      ad_hoc: "Configuration exists but accepts missing or malformed values silently."
      basic: "Configuration has documented keys and sane defaults."
      mature: "Configuration validation fails closed with actionable errors."
      excellent: "Configuration has schema tests, drift checks, and compatibility guidance."
  - id: "security_privacy"
    name: "Security And Privacy"
    intent: "The capability protects authorization, secrets, sensitive data, and prompt/log boundaries."
    measurement_procedure: "Inspect auth checks, permission boundaries, redaction, retention, and abuse-case tests."
    evidence_required:
      - "permission or trust-boundary path"
      - "sensitive-data handling proof"
      - "negative authorization/control proof"
    per_tier_thresholds:
      absent: "No security/privacy boundary is identified."
      ad_hoc: "Controls are informal, undocumented, or only partly applied."
      basic: "Primary trust boundaries and sensitive fields are documented and guarded."
      mature: "Unauthorized access, secret leakage, and retention boundaries are tested."
      excellent: "Controls fail closed, are audited, and include regression fixtures for abuse cases."
  - id: "persistence_migrations"
    name: "Persistence And Migrations"
    intent: "Persisted state remains compatible, recoverable, and non-corrupting over time."
    measurement_procedure: "Inspect state files, schemas, migrations, atomic writes, and downgrade/upgrade behavior."
    evidence_required:
      - "state path or schema"
      - "migration/compatibility proof"
      - "corrupt or partial-state proof"
    per_tier_thresholds:
      absent: "State shape is implicit or unsafe to evolve."
      ad_hoc: "State exists but lacks versioning or partial-write protection."
      basic: "State has a declared shape and current read/write proof."
      mature: "Versioning, migration, atomicity, and corrupt-state handling are tested."
      excellent: "Recovery, rollback, and compatibility checks are part of normal verification."
  - id: "operational_recovery"
    name: "Operational Recovery"
    intent: "The capability can be restarted, retried, rolled back, or repaired after interruption."
    measurement_procedure: "Run interrupted, duplicate, stale-lock, retry, and rollback scenarios where applicable."
    evidence_required:
      - "retry or rollback path"
      - "interruption fixture"
      - "post-recovery state proof"
    per_tier_thresholds:
      absent: "Interrupted work leaves unrecoverable or misleading state."
      ad_hoc: "Manual cleanup is possible but not documented or verified."
      basic: "The common failure can be retried safely."
      mature: "Restart, rollback, stale-lock, and duplicate-run behavior are verified."
      excellent: "Recovery is automated or guided, idempotent, and covered by regression tests."
  - id: "cross_backend_parity"
    name: "Cross-Backend Parity"
    intent: "Equivalent capability promises are evaluated consistently across supported backends or modes."
    measurement_procedure: "Compare supported backend/mode behavior against the same dimension thresholds."
    evidence_required:
      - "backend or mode roster"
      - "per-backend score/evidence"
      - "gap rationale or remediation owner"
    per_tier_thresholds:
      absent: "No parity comparison exists across backends or modes."
      ad_hoc: "Some backends are checked manually or with uneven criteria."
      basic: "Primary backends are scored against shared criteria."
      mature: "All first-class backends/modes have comparable evidence and gap tracking."
      excellent: "Parity scoring catches below-median and outlier-above maturity drift with fixtures."
